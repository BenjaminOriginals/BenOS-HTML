/* ===================================================================== */
/* CONTEXT MENU ENGINE — generic, supports submenus & separators          */
/* ===================================================================== */
function showCtx(x,y,items){
  const root=$('#ctx-root'); root.innerHTML=''; root.style.display='block';
  const menu=buildCtxMenu(items);
  root.appendChild(menu);
  // position within viewport
  const r=menu.getBoundingClientRect();
  if(x+r.width>window.innerWidth)x=window.innerWidth-r.width-6;
  if(y+r.height>window.innerHeight)y=window.innerHeight-r.height-6;
  menu.style.left=Math.max(2,x)+'px'; menu.style.top=Math.max(24,y)+'px';
}
function buildCtxMenu(items){
  const menu=el('div','ctx-menu');
  items.forEach(it=>{
    if(it.sep){ menu.appendChild(el('div','ctx-sep')); return; }
    const row=el('div','ctx-item'+(it.disabled?' disabled':''));
    row.innerHTML='<span>'+esc(it.label)+'</span>'+(it.submenu?'<span class="arrow">▶</span>':(it.check?'<span class="arrow">✓</span>':''));
    if(it.submenu){
      let sub=null;
      row.addEventListener('mouseenter',()=>{
        $$('.ctx-menu',menu.parentElement).forEach(m=>{if(m!==menu&&m._owner===menu)m.remove();});
        sub=buildCtxMenu(it.submenu); sub._owner=menu; menu.parentElement.appendChild(sub);
        const rr=row.getBoundingClientRect();
        let sx=rr.right-3, sy=rr.top-5;
        const sr=sub.getBoundingClientRect();
        if(sx+sr.width>window.innerWidth)sx=rr.left-sr.width+3;
        sub.style.left=sx+'px'; sub.style.top=sy+'px';
      });
    }else if(!it.disabled){
      row.addEventListener('click',()=>{ hideCtx(); try{ it.action&&it.action(); }catch(e){ benRecoverable(e.message||e); } });
    }else{
      // macOS-style "bonk" when an unavailable option is clicked
      row.addEventListener('click',e=>{ e.stopPropagation(); playSound('alert'); });
    }
    menu.appendChild(row);
  });
  return menu;
}
function hideCtx(){ $('#ctx-root').style.display='none'; $('#ctx-root').innerHTML=''; }

/* ---- per-object context menus (DESKTOP, FILE, FOLDER, APP, DOCK, WINDOW) ---- */
function nodeContextMenu(n,x,y,origin){

/* ===================================================================== */
/* CLIPBOARD + shared file operations                                     */
/* ===================================================================== */
let Clip={mode:null,ids:[]};
async function pasteInto(pid){
  if(!Clip.ids.length)return;
  for(const id of Clip.ids){
    if(Clip.mode==='cut')await FS.move(id,pid);
    else await FS.duplicate(id,pid);
  }
  if(Clip.mode==='cut')Clip={mode:null,ids:[]};
  refreshAfterFS(pid);
}
async function quickNewFolder(pid){ const f=await FS.createFolder(pid,'untitled folder'); refreshAfterFS(pid); promptRename(f); }
async function quickNewFile(pid){ const f=await FS.createFile(pid,'untitled.txt',''); refreshAfterFS(pid); promptRename(f); }
function promptRename(n){
  promptText('Rename','Enter a new name for "'+n.name+'":', n.name, false, async(v)=>{
    v=(v||'').trim(); if(v){ await FS.rename(n.id,v); refreshAfterFS(n.parentId); }
  });
}
/* Move an item to the Trash (recoverable). System apps cannot be trashed. */
async function deleteNode(n){
  if(n.id==='trash'||n.parentId==='trash'){ return; }
  if(n.systemApp){ // protect built-in apps
    showDialog({icon:'⚠️',title:'Can’t Move to Trash',body:'“'+n.name+'” is a system application and can’t be deleted.'}); playSound('alert'); return;
  }
  const pid=n.parentId;
  n.trashedFrom = pid; n.trashedAt = now();
  await FS.move(n.id,'trash');
  refreshAfterFS(pid); refreshAfterFS('trash');
  notify('Moved to Trash', n.name, '🗑');
}
/* permanently delete (used inside the Trash) */
async function deleteForever(n){
  showDialog({icon:'🗑',title:'Delete Immediately',body:'Permanently delete “'+n.name+'”? This cannot be undone.',buttons:[
    {label:'Cancel'},
    {label:'Delete',primary:true,onClick:async()=>{ await FS.remove(n.id); refreshAfterFS('trash'); notify('Deleted', n.name+' was permanently removed','🗑'); }}
  ]});
}
/* restore a trashed item to where it came from */
async function restoreFromTrash(n){
  const dest = (n.trashedFrom && FS.get(n.trashedFrom)) ? n.trashedFrom : 'desktop';
  await FS.move(n.id, dest);
  refreshAfterFS('trash'); refreshAfterFS(dest);
  notify('Restored', n.name+' put back', '↩️');
}
function emptyTrash(){
  const items=FS.children('trash');
  if(!items.length){ playSound('alert'); notify('Trash is empty','Nothing to remove','🗑'); return; }
  showDialog({icon:'🗑',title:'Empty Trash',body:'Permanently erase '+items.length+' item'+(items.length>1?'s':'')+'? This cannot be undone.',buttons:[
    {label:'Cancel'},
    {label:'Empty Trash',primary:true,onClick:async()=>{ for(const c of items){ await FS.remove(c.id); } refreshAfterFS('trash'); notify('Trash emptied',items.length+' item'+(items.length>1?'s':'')+' removed','🗑'); }}
  ]});
}
async function createShortcut(n){
  const s=await FS.createFile(n.parentId, n.name.replace(/(\.\w+)?$/,' alias$1'), '', n.kind);
  s.systemApp=n.systemApp; s.content=n.content; s.kind=n.kind; s.type=n.type; await FS.save(s);
  refreshAfterFS(n.parentId); notify('Shortcut created',s.name,'🔗');
}
async function compressNode(n){
  const zip=await FS.createFile(n.parentId, n.name+'.zip','[Compressed archive of '+n.name+']','zip');
  zip.size=Math.max(1024,Math.round(sizeOf(n)*0.6)); await FS.save(zip);
  refreshAfterFS(n.parentId); notify('Compressed',n.name+' → '+zip.name,'🗜');
}
function showProperties(n){
  const childCount = n.type==='folder'?FS.children(n.id).length:null;
  showDialog({icon:iconHTML(n,46).replace(/class="ico[^"]*"/,'class="ico"'),title:n.name,body:''});

function openNode(n){
  if(!n)return;
  if(n.systemApp){ launchSystemApp(n.systemApp, null, n.id); return; }
  if(n.type==='folder'){ launchSystemApp('files', n.id); return; }
  if(n.type==='app'||n.kind==='app'||extOf(n.name)==='html'||extOf(n.name)==='htm'){ launchHTMLApp(n); return; }
  if(n.kind==='image'){ openImageViewer(n); return; }
  if(n.kind==='audio'){ launchSystemApp('music', null, null, n); return; }
  if(n.kind==='video'){ openVideoViewer(n); return; }
  if(n.kind==='pdf'){ openTextEditor(n); return; }
  // default: text editor
  openTextEditor(n);
}

/* launch a built-in system application (native, privileged FS access) */
function launchSystemApp(key, arg, fileId, extra){
  const meta=SYSTEM_APPS[key]; if(!meta)return;
  fileId = fileId || ('app-'+key);
  // settings/single-instance behavior: focus existing if present
  const existing = WM.byApp(key)[0];
  if(existing && key!=='files'){ existing.minimized?WM.restore(existing):WM.focus(existing); return existing; }
  const win=WM.create({title:meta.name, systemApp:key, fileId,
    width:key==='terminal'?660:(key==='browser'?900:(key==='studios'?920:760)),
    height:key==='terminal'?420:(key==='health'?540:(key==='studios'?580:520))});
  try{
    if(key==='files') buildFilesApp(win, arg||'desktop');
    else if(key==='settings') buildSettingsApp(win);
    else if(key==='browser') buildBrowserApp(win);
    else if(key==='music') buildMusicApp(win, extra);
    else if(key==='health') buildHealthApp(win);
    else if(key==='studios') buildStudiosApp(win, extra);
    else if(key==='terminal') buildTerminalApp(win);
    else if(key==='pen') buildPenApp(win);
    else if(key==='benviewer') buildImageViewerApp(win, extra);
  }catch(e){ appCrash(win, e.message||e); }
  updateDockRunning();
  return win;
}

/* launch a user HTML file as a sandboxed application with crash bridge */
function launchHTMLApp(n){
  const win=WM.create({title:n.name.replace(/\.html?$/,''), fileId:n.id, width:720,height:480});
  const bridge =
    '<script>(function(){'+
    'window.onerror=function(m){parent.postMessage({__benos:1,type:"crash",msg:m},"*");return true;};'+
    'window.addEventListener("unhandledrejection",function(e){parent.postMessage({__benos:1,type:"crash",msg:(e.reason&&e.reason.message)||String(e.reason)},"*");});'+
    '})();<\/script>';
  const html=(n.content||'').includes('<html')? (n.content) : ('<!DOCTYPE html><html><head><meta charset="utf-8"></head><body style="font-family:-apple-system,sans-serif;margin:0">'+(n.content||'<p style=padding:20px>Empty application.</p>')+'</body></html>');
  const iframe=el('iframe');
  iframe.setAttribute('sandbox','allow-scripts allow-forms allow-modals allow-popups allow-pointer-lock allow-fullscreen');
  iframe.srcdoc=bridge+html;
  win.body.appendChild(iframe);
  // crash bridge listener (per window)
  win._msg=(ev)=>{ if(ev.source===iframe.contentWindow && ev.data&&ev.data.__benos&&ev.data.type==='crash'){ appCrash(win, ev.data.msg); window.removeEventListener('message',win._msg); } };
  window.addEventListener('message',win._msg);
  const oldClose=win.onClose; win.onClose=()=>{ window.removeEventListener('message',win._msg); if(oldClose)oldClose(); };
  return win;
}

/* ===================================================================== */
/* DESKTOP EVENTS — global wiring                                          */
/* ===================================================================== */
function wireDesktopEvents(){
  // dismiss menus on click anywhere
  document.addEventListener('mousedown',e=>{
    if(!e.target.closest('.ctx-menu')) hideCtx();
    if(!e.target.closest('#notif-center')&&!e.target.closest('#mb-notif')&&$('#notif-center').classList.contains('open')) $('#notif-center').classList.remove('open');
    if(!e.target.closest('.desk-icon')&&!e.target.closest('.window')&&e.target.closest('#desktop')){ deskSel.clear(); $$('.desk-icon').forEach(x=>x.classList.remove('sel')); }
  });
  // desktop right-click
  $('#icon-layer').addEventListener('contextmenu',e=>{ if(e.target.closest('.desk-icon'))return; e.preventDefault(); desktopMenu(e.clientX,e.clientY); });
  $('#desktop').addEventListener('contextmenu',e=>{ if(e.target.closest('.window')||e.target.closest('.desk-icon'))return; e.preventDefault(); desktopMenu(e.clientX,e.clientY); });
  document.addEventListener('contextmenu',e=>{ if(e.target.closest('#menubar')||e.target.closest('#dock')) e.preventDefault(); });

  // menu bar right side
  $('#mb-spot').onclick=openSpotlight;
  $('#mb-notif').onclick=toggleNotifCenter;
  $('#nc-clear').onclick=()=>{ NOTES.length=0; renderNotifCenter(); };
  $('#mb-wifi').onclick=openWifiPanel;
  $('#mb-control').onclick=openControlCenter;

  // spotlight input
  $('#spot-input').addEventListener('input',e=>spotSearch(e.target.value));
  $('#spotlight').addEventListener('mousedown',e=>{ if(e.target.id==='spotlight')closeSpotlight(); });

  // global keyboard
  document.addEventListener('keydown',e=>{
    if(e.ctrlKey && e.code==='Space'){ e.preventDefault(); $('#spotlight').style.display==='flex'?closeSpotlight():openSpotlight(); return; }
    if(e.key==='Escape'){ hideCtx(); if($('#spotlight').style.display==='flex')closeSpotlight(); }
    if($('#spotlight').style.display==='flex'){
      if(e.key==='ArrowDown'){e.preventDefault();spotMove(1);}
      if(e.key==='ArrowUp'){e.preventDefault();spotMove(-1);}
      if(e.key==='Enter'){ const n=spotItems[spotSel]; if(n){closeSpotlight();openNode(n);} }
    }
    if((e.metaKey||e.ctrlKey)&&e.key==='w'&&WM.focused){ e.preventDefault(); WM.close(WM.focused); }
  });

  // ---- drag & drop import from the real computer ----
  const dz=$('#desktop');
  ['dragenter','dragover'].forEach(ev=>dz.addEventListener(ev,e=>{e.preventDefault();e.dataTransfer.dropEffect='copy';}));
  dz.addEventListener('drop',async e=>{
    e.preventDefault();
    if(e.target.closest('.window'))return; // windows handle their own
    if(!e.dataTransfer.files||!e.dataTransfer.files.length)return;
    await importFiles(e.dataTransfer.files,'desktop');
  });

  window.addEventListener('resize',()=>{ [...WM.windows.values()].forEach(w=>{ if(w.maximized){w.el.style.width=window.innerWidth+'px';w.el.style.height=window.innerHeight+'px';} }); });

  let edgeTimer=null;
  document.addEventListener('mousemove',e=>{
    const anyMax=[...WM.windows.values()].some(w=>w.maximized);
    if(!anyMax)return;
    if(edgeTimer)clearTimeout(edgeTimer);
    if(e.clientY<3){
      $('#menubar').classList.remove('mbar-hide');
    }else if(e.clientY>window.innerHeight-8){
      $('#dock-wrap').classList.remove('dock-hide');
    }
    edgeTimer=setTimeout(()=>{
      const anyMax2=[...WM.windows.values()].some(w=>w.maximized);
      if(!anyMax2)return;
      if(e.clientY>=3&&e.clientY<=window.innerHeight-8){
        $('#menubar').classList.add('mbar-hide');
        $('#dock-wrap').classList.add('dock-hide');
      }
    },1500);
  });
}

/* import a FileList into a target folder, persisting permanently */
async function importFiles(fileList, parentId){
  let count=0;
  for(const f of fileList){
    try{
      const kind=kindFromName(f.name,f.type);
      const asText = kind==='txt' && f.size<512000;
      const content = await readFileAs(f, asText?'text':'dataURL');
      const n=await FS.createFile(parentId, f.name, content, kind);
      n.size=f.size; n.mime=f.type; await FS.save(n);
      count++;
    }catch(err){ benRecoverable('Import failed: '+(err.message||err)); }
  }
  refreshAfterFS(parentId);
  if(count) notify('Files imported', count+' file'+(count>1?'s':'')+' added to '+FS.pathOf(parentId),'📥');
}
function readFileAs(file,mode){
  return new Promise((res,rej)=>{
    const r=new FileReader();
    r.onload=()=>res(r.result);
    r.onerror=()=>rej(r.error||new Error('read error'));
    if(mode==='text')r.readAsText(file); else r.readAsDataURL(file);
  });
}

const Audio$={

  setVolume(v){ BENOS.volume=Math.max(0,Math.min(1,v)); BENOS.muted=false; Audio$.apply(); FS.setMeta('volume',BENOS.volume); },

/* PREINSTALLED APP — FILES (Finder-style file manager)                    */
/* ===================================================================== */
function buildFilesApp(win, startId){
  win.appName='Files';
  let cwd=startId||'desktop';
  let view=FS.getMeta('filesView','icon');
  const history=[cwd]; let hpos=0;
  const root=el('div','flexcol'); win.body.appendChild(root);
  root.innerHTML=
    '<div class="toolbar">'+
      '<button class="tbtn icon" data-a="back">◀</button>'+
      '<button class="tbtn icon" data-a="fwd">▶</button>'+
      '<div style="flex:1;display:flex;align-items:center;gap:6px">'+
        '<button class="tbtn icon" data-a="up">⤴</button>'+
        '<span id="fpath" style="font-size:12px;color:#555;font-weight:600"></span>'+
      '</div>'+
      '<span id="fempty" style="display:none"><button class="tbtn" data-a="empty" style="color:#c44;font-weight:600">Empty Trash</button></span>'+
      '<button class="tbtn icon" data-a="iview" title="Icon view">▦</button>'+
      '<button class="tbtn icon" data-a="lview" title="List view">☰</button>'+
      '<input id="fsearch" placeholder="Search" style="width:120px;padding:5px 9px;border:1px solid #ccc;border-radius:13px;font-size:12px;outline:none">'+
    '</div>'+
    '<div style="flex:1;display:flex;min-height:0">'+
      '<div id="fsidebar" style="width:160px;flex:0 0 160px;background:#ededf0;border-right:1px solid #d7d7da;overflow:auto;padding:10px 8px;font-size:13px"></div>'+
      '<div id="fmain" style="flex:1;overflow:auto;position:relative;background:#fff"></div>'+
    '</div>'+
    '<div style="flex:0 0 auto;padding:4px 12px;background:#f3f3f5;border-top:1px solid #ddd;font-size:11px;color:#777" id="fstatus"></div>';

  const main=$('#fmain',root), pathEl=$('#fpath',root), status=$('#fstatus',root), sidebar=$('#fsidebar',root);

  function buildSidebar(){
    const favs=[['desktop','🖥','Desktop'],['documents','📄','Documents'],['downloads','⤓','Downloads'],['applications','📦','Applications'],['pictures','🖼','Pictures'],['music-folder','🎵','Music'],['trash','🗑','Trash'],['root','💽','Internal Disk']];
    sidebar.innerHTML='<div style="font-size:11px;color:#999;font-weight:700;margin:2px 4px 6px">FAVORITES</div>'+
      favs.map(f=>'<div class="fav" data-id="'+f[0]+'" style="display:flex;gap:8px;padding:5px 8px;border-radius:6px;cursor:default;align-items:center'+(f[0]===cwd?';background:#d3d8e0':'')+'"><span>'+f[1]+'</span><span>'+f[2]+'</span></div>').join('');
    $$('.fav',sidebar).forEach(f=>f.onclick=win.guard(()=>navigate(f.dataset.id)));
  }

  function navigate(id,noHist){
    cwd=id;
    if(!noHist){ history.splice(hpos+1); history.push(id); hpos=history.length-1; }
    render();
  }
  win.refresh=()=>render();

  function render(){
    const folder=FS.get(cwd)||FS.get('desktop');
    cwd=folder.id;
    pathEl.textContent=FS.pathOf(cwd)==='/'?'Internal Disk':FS.pathOf(cwd);
    const emptyBtn=$('#fempty',root);
    emptyBtn.style.display=cwd==='trash'?'':'none';
    buildSidebar();
    let items=FS.children(cwd).sort((a,b)=>a.type===b.type?a.name.localeCompare(b.name):(a.type==='folder'?-1:1));
    const q=$('#fsearch',root).value.trim().toLowerCase();
    if(q)items=FS.search(q);
    main.innerHTML='';
    if(view==='icon'){
      const grid=el('div'); grid.style.cssText='display:flex;flex-wrap:wrap;gap:6px;padding:14px;align-content:flex-start';
      items.forEach(n=>grid.appendChild(fileTile(n)));
      if(!items.length)grid.innerHTML='<div style="color:#aaa;padding:30px;width:100%;text-align:center">This folder is empty</div>';
      main.appendChild(grid);
    }else{
      const list=el('div');
      list.innerHTML='<div style="display:flex;font-size:11px;color:#888;font-weight:700;padding:6px 12px;border-bottom:1px solid #eee;position:sticky;top:0;background:#fafafa"><div style="flex:1">Name</div><div style="width:90px">Size</div><div style="width:150px">Modified</div></div>';
      items.forEach(n=>{
        const r=el('div');
        r.style.cssText='display:flex;align-items:center;padding:5px 12px;border-bottom:1px solid #f3f3f3;font-size:13px;cursor:default';
        r.innerHTML='<div style="flex:1;display:flex;gap:9px;align-items:center">'+iconHTML(n,22)+'<span>'+esc(n.name)+'</span></div><div style="width:90px;color:#888">'+(n.type==='folder'?'--':fmtSize(sizeOf(n)))+'</div><div style="width:150px;color:#888">'+fmtDate(n.modified)+'</div>';
        r.onmouseenter=()=>r.style.background='#f0f4fb'; r.onmouseleave=()=>r.style.background='';
        r.ondblclick=win.guard(()=>{ n.type==='folder'?navigate(n.id):openNode(n); });
        r.oncontextmenu=e=>{e.preventDefault();e.stopPropagation();nodeContextMenu(n,e.clientX,e.clientY,'files');};
        r.setAttribute('draggable','true');
        r.addEventListener('dragstart',e=>{ e.dataTransfer.setData('benos/id',n.id); });
        if(n.type==='folder'){
          r.setAttribute('data-folder-id',n.id);
          r.addEventListener('dragover',e=>{ e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect='move'; r.style.background='#d0d8e8'; });
          r.addEventListener('dragleave',()=>{ r.style.background=''; });
          r.addEventListener('drop',win.guard(async e=>{
            e.preventDefault(); e.stopPropagation(); r.style.background='';
            const id=e.dataTransfer.getData('benos/id');
            if(id && id!==n.id){ await FS.move(id,n.id); render(); refreshAfterFS('desktop'); }
          }));
        }
        list.appendChild(r);
      });
      if(!items.length)list.innerHTML+='<div style="color:#aaa;padding:30px;text-align:center">This folder is empty</div>';
      main.appendChild(list);
    }
    const s=FS.children(cwd);
    status.textContent=s.length+' items'+(Clip.ids.length?'  ·  '+Clip.ids.length+' in clipboard':'');
  }

  function fileTile(n){
    const t=el('div'); t.style.cssText='width:96px;display:flex;flex-direction:column;align-items:center;gap:4px;padding:8px 4px;border-radius:8px;cursor:default;text-align:center';
    t.innerHTML='<div>'+iconHTML(n,52)+'</div><div style="font-size:12px;word-break:break-word;line-height:14px;max-width:92px">'+esc(n.name)+'</div>';
    t.onmouseenter=()=>t.style.background='#eef3fc'; t.onmouseleave=()=>t.style.background='';
    t.ondblclick=win.guard(()=>{ n.type==='folder'?navigate(n.id):openNode(n); });
    t.oncontextmenu=e=>{e.preventDefault();e.stopPropagation();nodeContextMenu(n,e.clientX,e.clientY,'files');};
    t.setAttribute('draggable','true');
    t.addEventListener('dragstart',e=>{ e.dataTransfer.setData('benos/id',n.id); });
    if(n.type==='folder'){
      t.setAttribute('data-folder-id',n.id);
      t.addEventListener('dragover',e=>{ e.preventDefault(); e.stopPropagation(); e.dataTransfer.dropEffect='move'; t.style.background='#d0d8e8'; });
      t.addEventListener('dragleave',()=>{ t.style.background=''; });
      t.addEventListener('drop',win.guard(async e=>{
        e.preventDefault(); e.stopPropagation(); t.style.background='';
        const id=e.dataTransfer.getData('benos/id');
        if(id && id!==n.id){ await FS.move(id,n.id); render(); refreshAfterFS('desktop'); }
      }));
    }
    return t;
  }

  // toolbar actions
  $$('[data-a]',root).forEach(b=>b.onclick=win.guard(()=>{
    const a=b.dataset.a;
    if(a==='back'&&hpos>0){hpos--;navigate(history[hpos],true);}
    else if(a==='fwd'&&hpos<history.length-1){hpos++;navigate(history[hpos],true);}
    else if(a==='up'){ const p=FS.get(cwd); if(p&&p.parentId)navigate(p.parentId); }
    else if(a==='iview'){ view='icon'; FS.setMeta('filesView','icon'); render(); }
    else if(a==='lview'){ view='list'; FS.setMeta('filesView','list'); render(); }
    else if(a==='empty'){ emptyTrash(); render(); }
  }));
  $('#fsearch',root).addEventListener('input',()=>render());

  // empty-area context menu (paste / new)
  main.addEventListener('contextmenu',e=>{ if(e.target.closest('[draggable]')||e.target.closest('[style*="cursor:default"]'))return; });
  main.addEventListener('contextmenu',e=>{
    if(e.target!==main && !e.target.closest('#fmain'))return;
    if(e.target.closest('div[draggable]'))return;
    // only when clicking blank space
    let blank=true; let p=e.target; while(p&&p!==main){ if(p.getAttribute&&p.getAttribute('draggable')){blank=false;break;} p=p.parentElement; }
    if(!blank)return;
    e.preventDefault();e.stopPropagation();
    showCtx(e.clientX,e.clientY,[
      {label:'New Folder',action:()=>quickNewFolder(cwd)},
      {label:'New File',action:()=>quickNewFile(cwd)},
      {sep:true},
      {label:'Paste',action:()=>pasteInto(cwd),disabled:!Clip.ids.length},
      {label:'Import from Computer…',action:()=>pickFiles(cwd)},
      {sep:true},
      {label:'Get Info',action:()=>showProperties(FS.get(cwd))},
    ]);
  });

  // drag&drop: internal move + external import
  main.addEventListener('dragover',e=>{ e.preventDefault();e.dataTransfer.dropEffect='copy'; });
  main.addEventListener('drop',win.guard(async e=>{
    e.preventDefault();
    const folderTile=e.target.closest('[data-folder-id]');
    if(folderTile)return;
    const innerId=e.dataTransfer.getData('benos/id');
    if(innerId){ await FS.move(innerId,cwd); render(); refreshAfterFS('desktop'); return; }
    if(e.dataTransfer.files&&e.dataTransfer.files.length){ await importFiles(e.dataTransfer.files,cwd); render(); }
  }));

  render();
}
function pickFiles(parentId){
  const inp=el('input'); inp.type='file'; inp.multiple=true;
  inp.onchange=()=>{ if(inp.files.length)importFiles(inp.files,parentId); };
  inp.click();
}

function buildSettingsApp(win){

  async function renderWall(){
    const cur=FS.getMeta('wallpaper',null);

  async function setWall(u){ await FS.setMeta('wallpaper',u); applyWallpaper(); playSound('change'); renderWall(); notify('Wallpaper changed','Desktop background updated','🖼'); }
  function renderDock(){
    const size=FS.getMeta('dockSize',52), mag=FS.getMeta('dockMag',true);
    body.innerHTML=card('Dock Size','<input type="range" id="dsize" min="36" max="80" value="'+size+'" style="width:100%"><div style="font-size:12px;color:#888;margin-top:6px">Current: <span id="dsv">'+size+'</span>px</div>')
      +card('Magnification','<label style="display:flex;gap:10px;align-items:center;font-size:13px"><input type="checkbox" id="dmag" '+(mag?'checked':'')+'> Enable magnification effect</label>')
      +card('Dock Items','<div style="font-size:12px;color:#888">'+FS.getMeta('dock',[]).map(id=>(FS.get(id)||{}).name||'?').join(', ')+'</div><div style="font-size:11px;color:#aaa;margin-top:8px">Tip: right-click an app and choose “Pin to Dock”, or right-click a Dock icon to remove it.</div>');
    $('#dsize',body).oninput=win.guard(async e=>{ const v=+e.target.value; $('#dsv',body).textContent=v; await FS.setMeta('dockSize',v); buildDock(); });

      +card('Add User','<div style="display:flex;gap:8px;flex-wrap:wrap"><input id="nu-name" placeholder="User name" style="flex:1;min-width:120px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px"><input id="nu-pass" placeholder="Password (optional)" style="flex:1;min-width:120px;padding:7px 10px;border:1px solid #ccc;border-radius:6px;font-size:13px"><button class="tbtn" id="nu-add">Add User</button></div>')
      +card('Login Behaviour','<div style="font-size:12px;color:#666;line-height:1.7">The login screen appears only when a password is set <b>or</b> more than one user exists. With a single password-free user, BenOS logs in automatically on boot.<br>Current state: <b>'+(needsLogin()?'Login required at startup':'Auto-login enabled')+'</b></div>');
    $$('[data-pw]',body).forEach(b=>b.onclick=win.guard(()=>{ const i=+b.dataset.pw; promptText('Set Password','Enter a new password for '+users[i].name+':','',true, async v=>{ users[i].pass=v||''; await commit(); notify('Password updated',users[i].name,'🔒'); }); }));
    $$('[data-clr]',body).forEach(b=>b.onclick=win.guard(async()=>{ const i=+b.dataset.clr; users[i].pass=''; await commit(); }));
    $$('[data-del]',body).forEach(b=>b.onclick=win.guard(async()=>{ const i=+b.dataset.del; if(users.length<=1)return; const nm=users[i].name; users.splice(i,1); await commit(); notify('User removed',nm,'👤'); }));
    $('#nu-add',body).onclick=win.guard(async()=>{ const nm=$('#nu-name',body).value.trim(); if(!nm){return;} const pw=$('#nu-pass',body).value||''; users.push({name:nm,pass:pw,avatar:'👤'}); await commit(); notify('User added',nm,'👤'); });
  }
  function renderStorage(){

      +card('Contents','<div style="font-size:13px;line-height:1.9"><div>📄 Files: <b>'+s.files+'</b></div><div>📁 Folders: <b>'+s.folders+'</b></div><div>💾 Total items: <b>'+(s.files+s.folders)+'</b></div></div>')
      +card('Storage Engine','<div style="font-size:13px">Backend: <b>'+engine+'</b></div>'+(DB.mode==='memory'?'<div style="font-size:11px;color:#c0392b;margin-top:6px">⚠️ Persistent storage is blocked in this context. Serve BenOS over http:// for permanent saving.</div>':''));
  }
  function renderSystem(){

    body.innerHTML=card('About This BenOS',
      '<div style="font-size:13px;line-height:2"><div><b>BenOS 13.0 Beta 4</b></div>'+
      '<div>Version: '+BENOS.version+'</div><div>Build: '+BENOS.build+'</div><div>User: '+BENOS.user+'</div>'+
      '<div>Resolution: '+(screen.width||window.innerWidth||1920)+' × '+(screen.height||window.innerHeight||1080)+'</div>'+
      '<div>Browser: '+navigator.userAgent.split(') ')[0].split('(').pop()+'</div>'+
      '<div>Storage engine: '+(DB.mode==='idb'?'IndexedDB':(DB.mode==='local'?'localStorage':'In-memory'))+'</div></div>')
      +card('System Files (Metadata)', (function(){
        const md=FS.getMeta('systemMetadata',null);
        if(md && md.files){
          const n=Object.keys(md.files).length;
          return '<div style="font-size:13px;line-height:1.9"><div>Source: <b>github.com/'+esc('dedeprogames-official/BenOS-Metadata')+'</b></div><div>Directory: <b>/'+esc(md.version)+'/</b></div><div>Branch: <b>'+esc(md.branch)+'</b></div><div>Files downloaded: <b>'+n+'</b></div><div>Fetched: <b>'+fmtDate(md.fetchedAt)+'</b></div></div>';
        }
        return '<div style="font-size:13px;color:#888;line-height:1.7">No metadata was downloaded this session. BenOS booted from local data (the metadata repository was offline or empty). System files are fetched from <b>github.com/dedeprogames-official/BenOS-Metadata</b> at <b>/'+esc(BENOS.version)+'/</b> on boot.</div>';
      })())
      +card('Power','<div style="display:flex;gap:8px"><button class="tbtn" onclick="confirmAction(\'Restart BenOS?\',restartOS)">Restart</button><button class="tbtn" onclick="confirmAction(\'Shut down?\',shutdownOS)">Shut Down</button><button class="tbtn" onclick="confirmAction(\'Log out?\',logOut)">Log Out</button></div>')
      +card('Reset','<div style="font-size:12px;color:#666;line-height:1.6;margin-bottom:10px">Restore BenOS to factory settings. This permanently erases all files, settings, users and installed apps.</div><button class="tbtn" style="background:#ffeaea;border-color:#f3b6b6;color:#c0392b" onclick="factoryReset()">⚠️ Restore Factory Settings</button>');
  }
  renderNav(); renderBody();
}

function buildTerminalApp(win){
  win.appName='Terminal';
  win.body.style.background='#1e1e1e';
  const root=el('div'); root.style.cssText='height:100%;display:flex;flex-direction:column;font-family:Menlo,Monaco,monospace;font-size:13px;color:#e6e6e6;padding:10px;overflow:hidden';
  win.body.appendChild(root);
  const out=el('div'); out.style.cssText='flex:1;overflow:auto;white-space:pre-wrap;line-height:1.45;word-break:break-word';
  const inputLine=el('div'); inputLine.style.cssText='display:flex;align-items:center;gap:6px';
  const prompt=el('span'); prompt.style.color='#5af78e';
  const inp=el('input'); inp.style.cssText='flex:1;background:transparent;border:none;outline:none;color:#e6e6e6;font-family:inherit;font-size:13px;';
  inputLine.appendChild(prompt); inputLine.appendChild(inp);
  root.appendChild(out); root.appendChild(inputLine);

  let cwd='root'; const hist=[]; let hp=0;
  const print=(t,c)=>{ const d=el('div'); if(c)d.style.color=c; d.textContent=t; out.appendChild(d); out.scrollTop=out.scrollHeight; };
  const setPrompt=()=>{ prompt.textContent='ben@benos '+(FS.pathOf(cwd)==='/'?'/':FS.pathOf(cwd))+' $'; };
  win.body.addEventListener('mousedown',()=>setTimeout(()=>inp.focus(),0));

  print('BenOS 13.0 Beta 4 Terminal — type "help" for a list of commands.','#888'); print('');
  setPrompt(); setTimeout(()=>inp.focus(),60);

  function resolve(p){
    // returns node for a path (absolute or relative); null if not found
    if(!p)return FS.get(cwd);
    let base = p.startsWith('/')?'root':cwd;
    const parts=p.split('/').filter(x=>x.length);
    let cur=FS.get(base);
    for(const part of parts){
      if(part==='.')continue;
      if(part==='..'){ cur=FS.get(cur.parentId)||cur; continue; }
      const child=FS.childByName(cur.id,part);
      if(!child)return null; cur=child;
    }
    return cur;
  }
  function parentAndName(p){
    const parts=p.split('/').filter(x=>x.length); const name=parts.pop();
    const dir = parts.length? resolve((p.startsWith('/')?'/':'')+parts.join('/')) : FS.get(cwd);
    return {dir,name};
  }

  const cmds={
    help(){ print('Available commands:\n  help            show this help\n  ls [path]       list directory contents\n  cd <path>       change directory\n  pwd             print working directory\n  mkdir <name>    create a folder\n  touch <name>    create an empty file\n  cat <file>      print file contents\n  echo <text>     print text  (echo text > file to write)\n  rm <name>       remove a file or folder\n  cp <a> <b>      copy\n  mv <a> <b>      move/rename\n  open <name>     open a file/app in a window\n  tree            show the file tree\n  clear           clear the screen\n  whoami          current user\n  date            current date/time\n  neofetch        system info'); },
    ls(a){ const t=a[0]?resolve(a[0]):FS.get(cwd); if(!t){print('ls: no such file or directory: '+a[0],'#ff6b6b');return;} if(t.type!=='folder'){print(t.name);return;} const c=FS.children(t.id).sort((x,y)=>x.name.localeCompare(y.name)); if(!c.length){return;} print(c.map(n=>n.type==='folder'?n.name+'/':n.name).join('   ')); },
    cd(a){ if(!a[0]||a[0]==='~'){cwd='root';setPrompt();return;} const t=resolve(a[0]); if(!t){print('cd: no such directory: '+a[0],'#ff6b6b');return;} if(t.type!=='folder'){print('cd: not a directory: '+a[0],'#ff6b6b');return;} cwd=t.id; setPrompt(); },
    pwd(){ print(FS.pathOf(cwd)==='/'?'/':FS.pathOf(cwd)); },
    async mkdir(a){ if(!a[0]){print('mkdir: missing operand','#ff6b6b');return;} await FS.createFolder(cwd,a[0]); afterFS(); },
    async touch(a){ if(!a[0]){print('touch: missing operand','#ff6b6b');return;} await FS.createFile(cwd,a[0],''); afterFS(); },
    cat(a){ const t=resolve(a[0]); if(!t){print('cat: '+a[0]+': no such file','#ff6b6b');return;} if(t.type==='folder'){print('cat: '+a[0]+': is a directory','#ff6b6b');return;} print(typeof t.content==='string'&&!t.content.startsWith('data:')?t.content:'[binary file]'); },
    async echo(a,raw){ const gt=raw.indexOf('>'); if(gt>=0){ const text=raw.slice(5,gt).trim().replace(/^["']|["']$/g,''); const fname=raw.slice(gt+1).trim(); const {dir,name}=parentAndName(fname); if(!dir){print('echo: bad path','#ff6b6b');return;} const ex=FS.childByName(dir.id,name); if(ex){ex.content=text;ex.size=text.length;await FS.save(ex);}else{await FS.createFile(dir.id,name,text);} afterFS(); } else { print(a.join(' ')); } },
    async rm(a){ if(!a[0]){print('rm: missing operand','#ff6b6b');return;} const t=resolve(a[0]); if(!t){print('rm: '+a[0]+': no such file','#ff6b6b');return;} if(t.id==='root'){print('rm: cannot remove root','#ff6b6b');return;} await FS.remove(t.id); afterFS(); },
    async cp(a){ const s=resolve(a[0]); if(!s){print('cp: '+a[0]+': no such file','#ff6b6b');return;} const dst=a[1]?resolve(a[1]):null; await FS.duplicate(s.id, dst&&dst.type==='folder'?dst.id:cwd); afterFS(); },
    async mv(a){ const s=resolve(a[0]); if(!s){print('mv: '+a[0]+': no such file','#ff6b6b');return;} const dst=a[1]?resolve(a[1]):null; if(dst&&dst.type==='folder'){await FS.move(s.id,dst.id);}else if(a[1]){await FS.rename(s.id,a[1].split('/').pop());} afterFS(); },
    open(a){ const t=resolve(a[0]); if(!t){print('open: '+a[0]+': no such file','#ff6b6b');return;} openNode(t); print('Opening '+t.name+'…','#5af78e'); },
    tree(){ const lines=[]; (function walk(id,pre){ const c=FS.children(id).sort((x,y)=>x.name.localeCompare(y.name)); c.forEach((n,i)=>{ const last=i===c.length-1; lines.push(pre+(last?'└─ ':'├─ ')+n.name+(n.type==='folder'?'/':'')); if(n.type==='folder')walk(n.id,pre+(last?'   ':'│  ')); }); })(cwd,''); print(lines.join('\n')||'(empty)'); },
    clear(){ out.innerHTML=''; },
    whoami(){ print(BENOS.user); },
    date(){ print(new Date().toString()); },
    neofetch(){ const s=FS.stats(); print('       BenOS 13.0 Beta 4\n   ___   OS: BenOS '+BENOS.version+'\n  (o o)  Build: '+BENOS.build+'\n  ( - )  User: '+BENOS.user+'\n  /   \\  Files: '+s.files+'  Folders: '+s.folders+'\n         Storage: '+fmtSize(s.bytes)+'\n         Shell: bensh','#7ec5ff'); },
  };
  function afterFS(){ refreshAfterFS(cwd); [...WM.windows.values()].forEach(w=>{if(w.systemApp==='files'&&w.refresh)w.refresh();}); }

  inp.addEventListener('keydown',win.guard(async e=>{
    if(e.key==='Enter'){
      const raw=inp.value; const line=raw.trim();
      print(prompt.textContent+' '+raw);
      inp.value='';
      if(line){ hist.push(line); hp=hist.length;
        const parts=line.split(/\s+/); const cmd=parts[0]; const args=parts.slice(1);
        if(cmds[cmd]){ try{ await cmds[cmd](args,line); }catch(err){ print(cmd+': '+(err.message||err),'#ff6b6b'); } }
        else print('bensh: command not found: '+cmd,'#ff6b6b');
      }
      setPrompt();
    }else if(e.key==='ArrowUp'){ if(hp>0){hp--;inp.value=hist[hp]||'';} e.preventDefault(); }
    else if(e.key==='ArrowDown'){ if(hp<hist.length){hp++;inp.value=hist[hp]||'';} e.preventDefault(); }
  }));
}

function buildBrowserApp(win){
  win.appName='BenBrowser';
  const root=el('div','flexcol'); win.body.appendChild(root);
  root.innerHTML=
    '<div id="tabbar" style="display:flex;align-items:center;gap:2px;background:#dee1e6;padding:6px 6px 0;flex:0 0 auto;overflow-x:auto"></div>'+
    '<div class="toolbar" style="gap:6px">'+
      '<button class="tbtn icon" data-a="back">◀</button>'+

      '<input id="omni" placeholder="Search or type a URL" style="flex:1;padding:7px 14px;border:1px solid #ccc;border-radius:16px;font-size:13px;outline:none">'+
      '<button class="tbtn icon" data-a="ext" title="Open current page in a real browser tab">↗</button>'+
      '<button class="tbtn icon" data-a="dl" title="Downloads">⤓</button>'+
    '</div>'+
    '<div id="viewport" style="flex:1;position:relative;background:#fff;min-height:0"><div class="bb-loadbar" id="bb-load"></div></div>';
  const vp=$('#viewport',root), omni=$('#omni',root), tabbar=$('#tabbar',root);

/* Download handler used by the browser — saves into Downloads/ permanently */
async function benDownload(name,content,mime){
  const kind=kindFromName(name,mime);
  const f=await FS.createFile('downloads',name,content,kind);
  f.mime=mime||''; f.size=content.length; await FS.save(f);
  refreshAfterFS('downloads');
  notify('Download complete',name+' saved to Downloads','⤓');
}

      card('<h3 style="font-size:14px;margin-bottom:10px">📈 Statistics</h3><div style="font-size:13px;line-height:2;color:#555"><div>Avg daily steps: <b>'+Math.round(data.hist.reduce((s,d)=>s+d.steps,0)/7).toLocaleString()+'</b></div><div>Avg sleep: <b>'+(data.hist.reduce((s,d)=>s+d.sleep,0)/7).toFixed(1)+' h</b></div><div>Avg water: <b>'+(data.hist.reduce((s,d)=>s+d.water,0)/7).toFixed(1)+' cups</b></div></div>');
    drawChart();
    $$('[data-h]',root).forEach(b=>b.onclick=win.guard(async()=>{
      const a=b.dataset.h;
      if(a==='water+')data.water++; else if(a==='water-')data.water=Math.max(0,data.water-1);
      else if(a==='steps+')data.steps+=500; else if(a==='steps-')data.steps=Math.max(0,data.steps-500);
      else if(a==='sleep+')data.sleep=Math.min(14,data.sleep+0.5); else if(a==='sleep-')data.sleep=Math.max(0,data.sleep-0.5);
      // mirror today's values into history (last entry)
      data.hist[6]={d:'Today',steps:data.steps,water:data.water,sleep:data.sleep};
      await save(); render();
    }));
  }
  function drawChart(){
    const cv=$('#hchart',root); if(!cv)return; const ctx=cv.getContext('2d');
    const W=cv.width,H=cv.height; ctx.clearRect(0,0,W,H);
    const max=Math.max(10000,...data.hist.map(d=>d.steps));
    const bw=W/data.hist.length;
    data.hist.forEach((d,i)=>{
      const bh=(d.steps/max)*(H-30); const x=i*bw+bw*0.2; const y=H-20-bh;
      const grad=ctx.createLinearGradient(0,y,0,H); grad.addColorStop(0,'#34c759'); grad.addColorStop(1,'#a8e6b9');
      ctx.fillStyle=grad; ctx.beginPath(); ctx.roundRect?ctx.roundRect(x,y,bw*0.6,bh,5):ctx.rect(x,y,bw*0.6,bh); ctx.fill();
      ctx.fillStyle='#999'; ctx.font='11px sans-serif'; ctx.textAlign='center';
      ctx.fillText(d.d,x+bw*0.3,H-5);
    });
  }
  data.hist[6]={d:'Today',steps:data.steps,water:data.water,sleep:data.sleep};
  save();
  render();
}

function openWifiPanel(){

  p.innerHTML=

    '<div class="wrow" style="border-bottom:none"><span>Ping</span><b id="wifi-ping">measuring…</b></div>';
  p.style.display='block';
  pingNow();
  if(_wifiTimer)clearInterval(_wifiTimer);
  _wifiTimer=setInterval(pingNow,1000);
}
function closeWifiPanel(){ const p=$('#wifi-panel'); p.style.display='none'; if(_wifiTimer){clearInterval(_wifiTimer);_wifiTimer=null;} }
function pingNow(){
  const site='scratch.mit.edu';
  const pingEl=$('#wifi-ping'), statEl=$('#wifi-status');
  if(!pingEl)return;
  const t0=performance.now();
  // image probe to the Scratch server; resolves on load or error — both give a round-trip timing
  const img=new Image();
  let done=false;
  const finish=(ok)=>{
    if(done)return; done=true;
    const ms=Math.round(performance.now()-t0);
    if(!$('#wifi-ping'))return;
    if(ok===false && ms>=950){
      $('#wifi-ping').textContent='timeout';
      if(statEl)statEl.textContent='Limited';
    }else{
      $('#wifi-ping').textContent=ms+' ms';
      if(statEl)statEl.textContent='Online';
    }
  };
  img.onload=()=>finish(true);
  img.onerror=()=>finish(true);
  setTimeout(()=>finish(false),950);
  img.src='https://'+site+'/favicon.ico?_='+Date.now();
}
document.addEventListener('mousedown',e=>{
  const p=$('#wifi-panel');
  if(p && p.style.display==='block' && !e.target.closest('#wifi-panel') && !e.target.closest('#mb-wifi')) closeWifiPanel();
});

function factoryReset(){
  showDialog({
    icon:'⚠️', title:'Restore Factory Settings',
    body:'This will permanently erase all files, settings, users and apps, returning BenOS to its original state. This cannot be undone.\n\nAre you sure?',
    buttons:[
      {label:'Cancel'},
      {label:'Erase Everything',primary:true,onClick:doFactoryReset}
    ]
  });
}
async function doFactoryReset(){
  const ov=el('div'); ov.style.cssText='position:fixed;inset:0;z-index:9500;background:#000;display:flex;flex-direction:column;align-items:center;justify-content:center;color:#fff;font-family:-apple-system,sans-serif;animation:fadeIn .3s ease';
  ov.innerHTML='<div style="font-size:60px;margin-bottom:24px;animation:spinPulse 1.4s ease-in-out infinite"></div><div style="font-size:16px;letter-spacing:1px;color:#ccc">Restoring factory settings…</div>';
  document.body.appendChild(ov);
  try{
    // wipe localStorage keys
    try{ localStorage.removeItem('benos_fs'); localStorage.removeItem('benos_meta'); }catch(e){}
    // wipe in-memory mirrors
    try{ DB.mem.fs.clear(); DB.mem.meta.clear(); }catch(e){}
    // delete the IndexedDB database
    try{ if(DB.db){ DB.db.close(); } }catch(e){}
    await new Promise(res=>{
      try{
        const req=indexedDB.deleteDatabase(DB.name);
        req.onsuccess=req.onerror=req.onblocked=()=>res();
        setTimeout(res,1500);
      }catch(e){ res(); }
    });
  }catch(e){}
  setTimeout(()=>location.reload(),700);
}

  root.innerHTML=
    '<div class="toolbar" style="background:linear-gradient(180deg,#2a2a32,#222229);border-bottom:1px solid #15151a;gap:6px">'+
      '<span style="color:#6943ff;font-weight:700;font-size:13px;margin-right:6px">⌨ BenStudios</span>'+

      '<button class="tbtn" data-s="save" style="background:#33333d;color:#ddd;border-color:#15151a">Save</button>'+
      '<button class="tbtn" data-s="saveapp" style="background:#6943ff;color:#fff;border-color:#5a37e0">Save as App</button>'+
      '<span id="bs-name" style="color:#888;font-size:12px;margin-left:6px">'+esc(fileName)+'</span>'+
      '<span style="flex:1"></span>'+
      '<span id="bs-stat" style="color:#5af78e;font-size:12px">Ready</span>'+
    '</div>'+
    '<div style="flex:1;display:flex;min-height:0">'+
      '<div style="flex:1;display:flex;flex-direction:column;min-width:0;position:relative;border-right:1px solid #15151a">'+
        '<div style="display:flex;flex:1;min-height:0;font-family:Menlo,Monaco,monospace;font-size:13px;line-height:1.5">'+
          '<div id="bs-gutter" style="padding:10px 8px;text-align:right;color:#555;background:#1a1a1f;user-select:none;overflow:hidden;min-width:42px;white-space:pre"></div>'+
          '<div style="flex:1;position:relative;overflow:auto">'+
            '<pre id="bs-hl" style="margin:0;padding:10px 12px;white-space:pre;pointer-events:none;color:#d4d4d4;min-height:100%"></pre>'+
            '<textarea id="bs-code" spellcheck="false" style="position:absolute;inset:0;margin:0;padding:10px 12px;background:transparent;color:transparent;caret-color:#fff;border:none;outline:none;resize:none;font-family:inherit;font-size:13px;line-height:1.5;white-space:pre;overflow:auto"></textarea>'+
          '</div>'+
        '</div>'+
        '<div id="bs-errors" style="flex:0 0 auto;max-height:120px;overflow:auto;background:#1a1a1f;border-top:1px solid #15151a;padding:6px 12px;font-family:Menlo,monospace;font-size:12px;color:#888"></div>'+
      '</div>'+
      '<div style="width:42%;flex:0 0 42%;display:flex;flex-direction:column;background:#fff;min-width:0">'+
        '<div style="background:#ececee;padding:5px 10px;font-size:11px;color:#888;border-bottom:1px solid #ddd">PREVIEW</div>'+
        '<iframe id="bs-preview" sandbox="allow-scripts" style="flex:1;border:none;width:100%;background:#fff"></iframe>'+
      '</div>'+
    '</div>';

  const ta=$('#bs-code',root), hl=$('#bs-hl',root), gutter=$('#bs-gutter',root),
        errBox=$('#bs-errors',root), preview=$('#bs-preview',root), stat=$('#bs-stat',root), nameEl=$('#bs-name',root);
  ta.value=startCode;

  // HTML syntax highlighter ------------------------------------------------
  function highlight(code){
    let s=code.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    // comments
    s=s.replace(/(&lt;!--[\s\S]*?--&gt;)/g,'<span style="color:#6a9955">$1</span>');
    // tags with attributes
    s=s.replace(/(&lt;\/?)([a-zA-Z][\w-]*)((?:[^&]|&(?!gt;))*?)(\/?&gt;)/g,function(m,open,tag,attrs,close){
      const a=attrs.replace(/([\w-]+)(\s*=\s*)(&quot;[^&]*?&quot;|&#39;[^&]*?&#39;|"[^"]*"|'[^']*'|[^\s>]+)/g,
        '<span style="color:#9cdcfe">$1</span>$2<span style="color:#ce9178">$3</span>');
      return '<span style="color:#808080">'+open+'</span><span style="color:#569cd6">'+tag+'</span>'+a+'<span style="color:#808080">'+close+'</span>';
    });
    return s;
  }
  function syncHL(){
    hl.innerHTML=highlight(ta.value)+'\n';
    const lines=ta.value.split('\n').length;
    let g=''; for(let i=1;i<=lines;i++)g+=i+'\n';
    gutter.textContent=g;
  }
  // error detection (basic HTML validation) --------------------------------
  function checkErrors(){
    const code=ta.value; const errs=[];
    const lines=code.split('\n');
    // unclosed tag scan via a simple stack
    const voidTags=['area','base','br','col','embed','hr','img','input','link','meta','param','source','track','wbr','!doctype'];
    const re=/<\/?([a-zA-Z!][\w-]*)([^>]*?)(\/?)>/g; let m; const stack=[];
    while((m=re.exec(code))){
      const tag=m[1].toLowerCase(); const isClose=m[0][1]==='/'; const selfClose=m[3]==='/'||voidTags.includes(tag)||tag.startsWith('!');
      const line=code.slice(0,m.index).split('\n').length;
      if(isClose){
        if(!stack.length || stack[stack.length-1].tag!==tag){
          errs.push({line,msg:'Unexpected closing tag &lt;/'+tag+'&gt;'});
        }else stack.pop();
      }else if(!selfClose){ stack.push({tag,line}); }
    }
    stack.forEach(s=>errs.push({line:s.line,msg:'Unclosed tag &lt;'+s.tag+'&gt;'}));
    // unbalanced angle brackets per line
    lines.forEach((ln,i)=>{ const o=(ln.match(/</g)||[]).length, c=(ln.match(/>/g)||[]).length; if(o!==c && (ln.indexOf('<')>=0||ln.indexOf('>')>=0)) {/* spans multiple lines, skip noisy */} });
    renderErrors(errs);
    return errs;
  }
  function renderErrors(errs){

  // preview -----------------------------------------------------------------

  }
  let debounce=null;
  function onChange(){
    syncHL();
    stat.textContent='Editing…'; stat.style.color='#e2b340';
    clearTimeout(debounce);
    // auto-update the live preview on every change, but only when the markup has no errors
    debounce=setTimeout(()=>{
      const errs=checkErrors();
      if(!errs.length){ doPreview(); stat.textContent='Live preview ✓'; stat.style.color='#5af78e'; }
      else{ stat.textContent=errs.length+' error'+(errs.length>1?'s':'')+' — preview paused'; stat.style.color='#f48771'; }
    },450);
  }
  ta.addEventListener('input',win.guard(onChange));
  ta.addEventListener('scroll',()=>{ hl.parentElement.scrollTop=ta.scrollTop; hl.style.transform='translateY('+(-0)+'px)'; gutter.scrollTop=ta.scrollTop; const wrap=hl.parentElement; wrap.scrollTop=ta.scrollTop; });
  // tab key inserts two spaces
  ta.addEventListener('keydown',e=>{
    if(e.key==='Tab'){ e.preventDefault(); const s=ta.selectionStart,en=ta.selectionEnd; ta.value=ta.value.slice(0,s)+'  '+ta.value.slice(en); ta.selectionStart=ta.selectionEnd=s+2; onChange(); }
    if((e.metaKey||e.ctrlKey)&&e.key==='s'){ e.preventDefault(); saveFile(); }
  });
  async function saveFile(){
    const name=fileName||'untitled.html';
    if(curFile && FS.get(curFile)){
      const n=FS.get(curFile); n.content=ta.value; n.size=ta.value.length; await FS.save(n);
    }else{
      filePicker({mode:'save',title:'Save HTML File',filter:['.html'],defName:name,startFolder:'documents',onSelect:async r=>{
        const n=await FS.createFile(r.folder,FS.uniqueName(r.folder,r.name),ta.value,'generic');
        curFile=n.id; fileName=n.name; nameEl.textContent=fileName;
        refreshAfterFS('documents');
        stat.textContent='Saved ✓'; stat.style.color='#5af78e';
        notify('Saved in BenStudios',fileName+' written to Documents','💾');
      }});
      return;
    }
    refreshAfterFS('documents');
    stat.textContent='Saved ✓'; stat.style.color='#5af78e';
    notify('Saved in BenStudios',fileName+' written to Documents','💾');
  }
  $$('[data-s]',root).forEach(b=>b.onclick=win.guard(()=>{
    const a=b.dataset.s;
    if(a==='new'){ ta.value='<!DOCTYPE html>\n<html>\n<head>\n  <meta charset="utf-8">\n  <title>New Page</title>\n</head>\n<body>\n  \n</body>\n</html>'; curFile=null; fileName='untitled.html'; nameEl.textContent=fileName; onChange(); }
    else if(a==='open'){ openPicker(); }
    else if(a==='save'){ saveFile(); }
    else if(a==='saveapp'){ saveAsApp(); }
  }));
  function saveAsApp(){
    filePicker({mode:'save',title:'Save as App',filter:['.html'],defName:(fileName||'MyApp').replace(/\.html?$/i,'')+'.html',startFolder:'applications',onSelect:async r=>{
      const appName = /\.html?$/i.test(r.name)?r.name:r.name+'.html';
      const n=await FS.createFile(r.folder, FS.uniqueName(r.folder,appName), ta.value, 'app');
      n.type='app'; n.kind='app'; await FS.save(n);
      refreshAfterFS('applications');
      stat.textContent='App created ✓'; stat.style.color='#5af78e';
      notify('App created', n.name+' is now in Applications','📦');
      showDialog({icon:'📦',title:'App Created',body:'“'+n.name+'” was saved to Applications. Double-click it there (or right-click → Pin to Dock) to run it. It runs sandboxed, and any JavaScript error will be caught by BenOS.',buttons:[
        {label:'Open Applications',primary:true,onClick:()=>launchSystemApp('files','applications')},
        {label:'Run Now',onClick:()=>launchHTMLApp(n)},
        {label:'Close'}
      ]});
    }});
  }
  function openPicker(){
    filePicker({mode:'open',title:'Open HTML File',filter:['.html'],onSelect:n=>{
      if(n){ ta.value=n.content||''; curFile=n.id; fileName=n.name; nameEl.textContent=fileName; onChange(); }
    }});
  }
  syncHL(); checkErrors(); doPreview();
}

function buildImageViewerApp(win, n){
  win.appName='BenViewer';
  const root=el('div','flexcol'); win.body.appendChild(root);
  root.style.background='#1c1c1e';
  let scale=1, offX=0, offY=0, panning=false, panStartX, panStartY, panStartOffX, panStartOffY;
  const img=new Image();
  const container=el('div');
  container.style.cssText='flex:1;display:flex;align-items:center;justify-content:center;overflow:hidden;position:relative;cursor:grab';
  const imgEl=el('img');
  imgEl.style.cssText='position:absolute;object-fit:contain;transition:transform .15s ease;image-rendering:auto';
  container.appendChild(imgEl);
  const toolbar=el('div');
  toolbar.style.cssText='flex:0 0 auto;display:flex;align-items:center;gap:6px;padding:4px 10px;background:rgba(30,30,32,.9);border-top:1px solid #333;color:#fff;font-size:12px';
  toolbar.innerHTML=
    '<button class="tbtn" data-z="out" style="color:#fff;background:#3a3a3c;border-color:#555;padding:2px 8px">−</button>'+
    '<span id="bz-zoom" style="min-width:40px;text-align:center">100%</span>'+
    '<button class="tbtn" data-z="in" style="color:#fff;background:#3a3a3c;border-color:#555;padding:2px 8px">+</button>'+
    '<span style="width:1px;height:20px;background:#444;margin:0 6px"></span>'+
    '<button class="tbtn" data-z="fit" style="color:#fff;background:#3a3a3c;border-color:#555;padding:2px 8px">Fit</button>'+
    '<button class="tbtn" data-z="one" style="color:#fff;background:#3a3a3c;border-color:#555;padding:2px 8px">100%</button>'+
    '<span style="flex:1"></span>'+
    '<button class="tbtn" data-z="open" style="color:#fff;background:#3a3a3c;border-color:#555;padding:2px 8px">📂 Open</button>'+
    '<span id="bz-info" style="color:#888"></span>';
  root.appendChild(container);
  root.appendChild(toolbar);
  function update(){
    imgEl.style.transform='translate('+offX+'px,'+offY+'px) scale('+scale+')';
    $('#bz-zoom',root).textContent=Math.round(scale*100)+'%';
  }
  function zoomTo(s, cx, cy){
    const r=container.getBoundingClientRect();
    const mx=cx||r.width/2, my=cy||r.height/2;
    const ratio=s/scale;
    offX=mx-ratio*(mx-offX);
    offY=my-ratio*(my-offY);
    scale=s;
    update();
  }
  container.addEventListener('wheel',e=>{
    e.preventDefault();
    const delta=e.deltaY>0?0.9:1.1;
    const ns=Math.max(0.1,Math.min(20,scale*delta));
    zoomTo(ns,e.clientX-container.getBoundingClientRect().left,e.clientY-container.getBoundingClientRect().top);
  },{passive:false});
  container.addEventListener('mousedown',e=>{
    if(e.button!==0)return;
    panning=true; panStartX=e.clientX; panStartY=e.clientY;
    panStartOffX=offX; panStartOffY=offY;
    container.style.cursor='grabbing';
  });
  document.addEventListener('mousemove',e=>{
    if(!panning)return;
    offX=panStartOffX+(e.clientX-panStartX);
    offY=panStartOffY+(e.clientY-panStartY);
    update();
  });
  document.addEventListener('mouseup',()=>{
    if(!panning)return;
    panning=false;
    container.style.cursor='grab';
  });
  $$('[data-z]',root).forEach(b=>b.onclick=win.guard(()=>{
    const z=b.dataset.z;
    if(z==='in')zoomTo(Math.min(20,scale*1.5));
    else if(z==='out')zoomTo(Math.max(0.1,scale/1.5));
    else if(z==='fit'){ scale=1; offX=0; offY=0; update(); }
    else if(z==='one'){ scale=1; offX=0; offY=0; update(); }
    else if(z==='open'){
      filePicker({mode:'open',title:'Open Image',filter:['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg','.heic','.tiff','.tif','.ico','.avif'],onSelect:node=>{
        if(node.kind==='image'||node.content&&node.content.startsWith('data:')){
          win.title=node.name+' — BenViewer';
          img.src=node.content;
          imgEl.src=node.content;
          img.onload=()=>{
            const cw=container.clientWidth, ch=container.clientHeight;
            const s=Math.min(cw/img.naturalWidth,ch/img.naturalHeight,1);
            scale=s; offX=0; offY=0; update();
            $('#bz-info',root).textContent=img.naturalWidth+'×'+img.naturalHeight+' px';
          };
        }
      }});
    }
  }));
  if(n){
    win.title=n.name+' — BenViewer';
    img.onload=()=>{
      const cw=container.clientWidth, ch=container.clientHeight;
      const s=Math.min(cw/img.naturalWidth,ch/img.naturalHeight,1);
      scale=s; offX=0; offY=0; update();
      $('#bz-info',root).textContent=img.naturalWidth+'×'+img.naturalHeight+' px';
    };
    img.src=n.content;
    imgEl.src=n.content;
  }
}

function buildPenApp(win){
  win.appName='BenPen';
  const root=el('div','flexcol'); win.body.appendChild(root);
  root.style.background='#ccc';
  const W=800,H=520;
  let tool='pencil', size=3, color='#000000', fillColor='#ffffff';
  let drawing=false, lastX, lastY;
  let undoStack=[], redoStack=[], maxUndo=50;
  let canvas, ctx, overlay, oCtx;
  let curFile=null, curFileName=null;

  root.innerHTML=
    '<div class="toolbar" style="background:linear-gradient(180deg,#f5f5f5,#e8e8e8);border-bottom:1px solid #bbb;gap:4px;flex-wrap:wrap;padding:4px 8px">'+
      '<span style="font-size:11px;color:#888;font-weight:600;margin-right:2px">Draw</span>'+
      '<button class="tbtn icon" data-t="pencil" title="Pencil" style="background:#fff;border:2px solid #000;border-radius:4px;padding:2px 6px">✏️</button>'+
      '<button class="tbtn icon" data-t="brush" title="Brush" style="border-radius:4px;padding:2px 6px">🖌️</button>'+
      '<button class="tbtn icon" data-t="eraser" title="Eraser" style="border-radius:4px;padding:2px 6px">🧹</button>'+
      '<button class="tbtn icon" data-t="fill" title="Fill" style="border-radius:4px;padding:2px 6px">🪣</button>'+
      '<button class="tbtn icon" data-t="picker" title="Color Picker" style="border-radius:4px;padding:2px 6px">💉</button>'+
      '<span style="width:1px;height:24px;background:#bbb;margin:0 4px"></span>'+
      '<span style="font-size:11px;color:#888;font-weight:600;margin-right:2px">Shapes</span>'+
      '<button class="tbtn icon" data-t="rect" title="Rectangle" style="border-radius:4px;padding:2px 6px">▭</button>'+
      '<button class="tbtn icon" data-t="ellipse" title="Ellipse" style="border-radius:4px;padding:2px 6px">◯</button>'+
      '<button class="tbtn icon" data-t="line" title="Line" style="border-radius:4px;padding:2px 6px">╱</button>'+
      '<button class="tbtn icon" data-t="triangle" title="Triangle" style="border-radius:4px;padding:2px 6px">△</button>'+
      '<button class="tbtn icon" data-t="hexagon" title="Hexagon" style="border-radius:4px;padding:2px 6px">⬡</button>'+
      '<button class="tbtn icon" data-t="star" title="Star" style="border-radius:4px;padding:2px 6px">★</button>'+
      '<button class="tbtn icon" data-t="arrow" title="Arrow" style="border-radius:4px;padding:2px 6px">➡</button>'+
      '<button class="tbtn icon" data-t="heart" title="Heart" style="border-radius:4px;padding:2px 6px">♥</button>'+
      '<button class="tbtn icon" data-t="diamond" title="Diamond" style="border-radius:4px;padding:2px 6px">⬢</button>'+
      '<button class="tbtn icon" data-t="pentagon" title="Pentagon" style="border-radius:4px;padding:2px 6px">⬠</button>'+
      '<span style="width:1px;height:24px;background:#bbb;margin:0 4px"></span>'+
      '<input type="color" id="pen-color" value="'+color+'" title="Foreground Color" style="width:28px;height:24px;padding:0;border:1px solid #888;cursor:default">'+
      '<input type="color" id="pen-fill" value="'+fillColor+'" title="Fill Color" style="width:28px;height:24px;padding:0;border:1px solid #888;cursor:default">'+
      '<span style="width:1px;height:24px;background:#bbb;margin:0 4px"></span>'+
      '<label style="font-size:11px;color:#555;display:flex;align-items:center;gap:4px">Size: <input type="range" id="pen-size" min="1" max="40" value="'+size+'" style="width:60px"></label>'+
      '<span id="pen-size-val" style="font-size:11px;color:#555;min-width:20px">'+size+'</span>'+
      '<span style="width:1px;height:24px;background:#bbb;margin:0 4px"></span>'+
      '<button class="tbtn" data-a="undo" title="Undo" style="border-radius:4px;padding:2px 6px">↩</button>'+
      '<button class="tbtn" data-a="redo" title="Redo" style="border-radius:4px;padding:2px 6px">↪</button>'+
      '<button class="tbtn" data-a="clear" title="Clear" style="border-radius:4px;padding:2px 6px;color:#c0392b">🗑</button>'+
      '<span style="width:1px;height:24px;background:#bbb;margin:0 4px"></span>'+
      '<div style="position:relative;display:inline-block">'+
        '<button class="tbtn" id="pen-filebtn" title="File" style="border-radius:4px;padding:2px 8px;font-weight:600">📁 File ▾</button>'+
        '<div id="pen-filemenu" style="display:none;position:absolute;top:100%;right:0;z-index:100;background:#fff;border:1px solid #ccc;border-radius:6px;box-shadow:0 6px 20px rgba(0,0,0,.2);min-width:150px;padding:4px 0;font-size:12px">'+
          '<div class="fp-item" data-fp="save" style="padding:6px 14px;cursor:default;display:flex;gap:8px;align-items:center">💾 Save</div>'+
          '<div class="fp-item" data-fp="saveas" style="padding:6px 14px;cursor:default;display:flex;gap:8px;align-items:center">💾 Save As…</div>'+
          '<div style="height:1px;background:#eee;margin:2px 8px"></div>'+
          '<div class="fp-item" data-fp="open" style="padding:6px 14px;cursor:default;display:flex;gap:8px;align-items:center">📂 Open…</div>'+
        '</div>'+
      '</div>'+
    '</div>'+
    '<div style="flex:1;display:flex;min-height:0;background:#555;padding:8px;justify-content:center">'+
      '<div style="position:relative;box-shadow:0 2px 12px rgba(0,0,0,.4)">'+
        '<canvas id="pen-canvas" width="'+W+'" height="'+H+'" style="display:block;background:#fff;cursor:crosshair"></canvas>'+
        '<canvas id="pen-overlay" width="'+W+'" height="'+H+'" style="position:absolute;top:0;left:0;pointer-events:none;display:block"></canvas>'+
      '</div>'+
    '</div>'+
    '<div style="flex:0 0 auto;padding:3px 12px;background:#e0e0e0;border-top:1px solid #bbb;font-size:11px;color:#666;display:flex;justify-content:space-between">'+
      '<span id="pen-status">Ready</span>'+
      '<span>'+W+' × '+H+' px</span>'+
    '</div>';

  canvas=$('#pen-canvas',root); ctx=canvas.getContext('2d');
  overlay=$('#pen-overlay',root); oCtx=overlay.getContext('2d');
  ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H);
  saveState();

  function saveState(){
    const data=canvas.toDataURL();
    undoStack.push(data);
    if(undoStack.length>maxUndo)undoStack.shift();
    redoStack=[];
  }
  function undo(){
    if(undoStack.length<2)return;
    redoStack.push(undoStack.pop());
    const img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,W,H); ctx.drawImage(img,0,0); };
    img.src=undoStack[undoStack.length-1];
  }
  function redo(){
    if(!redoStack.length)return;
    undoStack.push(redoStack.pop());
    const img=new Image(); img.onload=()=>{ ctx.clearRect(0,0,W,H); ctx.drawImage(img,0,0); };
    img.src=undoStack[undoStack.length-1];
  }

  function getPos(e){
    const r=canvas.getBoundingClientRect();
    return {x:Math.max(0,Math.min(W-1,(e.clientX-r.left)*(W/r.width))),y:Math.max(0,Math.min(H-1,(e.clientY-r.top)*(H/r.height)))};
  }

  function startDraw(e){
    const p=getPos(e); lastX=p.x; lastY=p.y;
    if(tool==='fill'){ floodFill(Math.round(p.x),Math.round(p.y),color); saveState(); return; }
    if(tool==='picker'){ pickColor(p); return; }
    drawing=true;
    if(tool==='pencil'||tool==='brush'||tool==='eraser'){
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
    }
  }
  function drawShape(ctx2,x1,y1,x2,y2,fill,stroke){
    ctx2.beginPath();
    const lx=Math.min(x1,x2), ly=Math.min(y1,y2), rx=Math.abs(x2-x1), ry=Math.abs(y2-y1);
    const cx=(x1+x2)/2, cy=(y1+y2)/2;
    if(tool==='line'){ ctx2.moveTo(x1,y1); ctx2.lineTo(x2,y2); }
    else if(tool==='rect'){ ctx2.rect(lx,ly,rx,ry); }
    else if(tool==='ellipse'){ ctx2.ellipse(cx,cy,rx/2,ry/2,0,0,Math.PI*2); }
    else if(tool==='triangle'){
      ctx2.moveTo(cx,ly); ctx2.lineTo(lx,y2); ctx2.lineTo(x2,y2); ctx2.closePath();
    }else if(tool==='hexagon'){
      for(let i=0;i<6;i++){ const a=i*Math.PI/3-Math.PI/2; ctx2[i?'lineTo':'moveTo'](cx+rx/2*Math.cos(a),cy+ry/2*Math.sin(a)); }
      ctx2.closePath();
    }else if(tool==='star'){
      for(let i=0;i<10;i++){ const a=i*Math.PI/5-Math.PI/2,r=i%2===0?Math.min(rx,ry)/2:Math.min(rx,ry)/4; ctx2[i?'lineTo':'moveTo'](cx+r*Math.cos(a),cy+r*Math.sin(a)); }
      ctx2.closePath();
    }else if(tool==='arrow'){
      ctx2.moveTo(lx,cy); ctx2.lineTo(x2,cy); ctx2.lineTo(x2-12,ly); ctx2.moveTo(x2,cy); ctx2.lineTo(x2-12,y2);
    }else if(tool==='heart'){
      ctx2.moveTo(cx,ly+ry*0.25); ctx2.bezierCurveTo(cx-rx*0.5,ly-ry*0.2,cx-rx,ly+ry*0.3,cx,y2); ctx2.moveTo(cx,ly+ry*0.25); ctx2.bezierCurveTo(cx+rx*0.5,ly-ry*0.2,cx+rx,ly+ry*0.3,cx,y2);
    }else if(tool==='diamond'){
      ctx2.moveTo(cx,ly); ctx2.lineTo(x2,cy); ctx2.lineTo(cx,y2); ctx2.lineTo(lx,cy); ctx2.closePath();
    }else if(tool==='pentagon'){
      for(let i=0;i<5;i++){ const a=i*Math.PI*2/5-Math.PI/2; ctx2[i?'lineTo':'moveTo'](cx+rx/2*Math.cos(a),cy+ry/2*Math.sin(a)); }
      ctx2.closePath();
    }
    if(stroke)ctx2.stroke();
    if(fill&&tool!=='line'&&tool!=='arrow'){ ctx2.fillStyle=fillColor; ctx2.fill(); }
  }
  function moveDraw(e){
    if(!drawing)return;
    const p=getPos(e);
    if(tool==='pencil'||tool==='brush'||tool==='eraser'){
      ctx.lineTo(p.x,p.y);
      ctx.stroke();
      ctx.beginPath(); ctx.moveTo(p.x,p.y);
    }else{
      oCtx.clearRect(0,0,W,H);
      oCtx.beginPath();
      drawShape(oCtx,lastX,lastY,p.x,p.y,true,true);
    }
  }
  function endDraw(e){
    if(!drawing)return;
    drawing=false;
    oCtx.clearRect(0,0,W,H);
    if(tool!=='pencil'&&tool!=='brush'&&tool!=='eraser'&&tool!=='fill'&&tool!=='picker'){
      const p=getPos(e);
      drawShape(ctx,lastX,lastY,p.x,p.y,true,true);
    }
    saveState();
  }

  function pickColor(p){
    const d=ctx.getImageData(Math.round(p.x),Math.round(p.y),1,1).data;
    const hex='#'+[d[0],d[1],d[2]].map(v=>v.toString(16).padStart(2,'0')).join('');
    color=hex; $('#pen-color',root).value=hex;
  }

  function floodFill(sx,sy,fillHex){
    const imgData=ctx.getImageData(0,0,W,H);
    const data=imgData.data;
    const targetIdx=(sy*W+sx)*4;
    const targetR=data[targetIdx],targetG=data[targetIdx+1],targetB=data[targetIdx+2];
    const [fillR,fillG,fillB]=hexToRgb(fillHex);
    if(targetR===fillR&&targetG===fillG&&targetB===fillB)return;
    const visited=new Uint8Array(W*H);
    const stack=[[sx,sy]];
    while(stack.length){
      const [x,y]=stack.pop();
      const idx=y*W+x;
      if(x<0||x>=W||y<0||y>=H||visited[idx])continue;
      const pi=idx*4;
      if(data[pi]!==targetR||data[pi+1]!==targetG||data[pi+2]!==targetB)continue;
      visited[idx]=1;
      data[pi]=fillR; data[pi+1]=fillG; data[pi+2]=fillB;
      stack.push([x+1,y],[x-1,y],[x,y+1],[x,y-1]);
    }
    ctx.putImageData(imgData,0,0);
  }
  function hexToRgb(h){
    const v=parseInt(h.replace('#',''),16);
    return [(v>>16)&255,(v>>8)&255,v&255];
  }

  function applyStyle(){
    if(tool==='eraser'){ ctx.strokeStyle='#ffffff'; ctx.lineWidth=size; ctx.globalCompositeOperation='source-over'; }
    else{ ctx.strokeStyle=color; ctx.lineWidth=size; ctx.globalCompositeOperation='source-over'; }
    oCtx.strokeStyle=color; oCtx.lineWidth=size;
    ctx.lineCap='round'; ctx.lineJoin='round';
    oCtx.lineCap='round'; oCtx.lineJoin='round';
  }

  canvas.addEventListener('mousedown',e=>{ applyStyle(); startDraw(e); });
  canvas.addEventListener('mousemove',moveDraw);
  canvas.addEventListener('mouseup',endDraw);
  canvas.addEventListener('mouseleave',endDraw);

  // tool buttons
  $$('[data-t]',root).forEach(b=>b.onclick=win.guard(()=>{
    tool=b.dataset.t;
    $$('[data-t]',root).forEach(x=>x.style.border='1px solid #ccc');
    b.style.border='2px solid #000';
    $('#pen-status',root).textContent='Tool: '+tool;
    canvas.style.cursor=tool==='fill'?'pointer':(tool==='picker'?'crosshair':'crosshair');
  }));
  // default pencil selected
  $('[data-t="pencil"]',root).style.border='2px solid #000';

  $('#pen-color',root).oninput=win.guard(e=>{ color=e.target.value; });
  $('#pen-fill',root).oninput=win.guard(e=>{ fillColor=e.target.value; });
  $('#pen-size',root).oninput=win.guard(e=>{ size=+e.target.value; $('#pen-size-val',root).textContent=size; });

  // File menu toggle
  const fileBtn=$('#pen-filebtn',root), fileMenu=$('#pen-filemenu',root);
  fileBtn.onclick=win.guard(e=>{ e.stopPropagation(); fileMenu.style.display=fileMenu.style.display==='block'?'none':'block'; });
  document.addEventListener('click',()=>{ fileMenu.style.display='none'; },{capture:true});
  $$('.fp-item',root).forEach(b=>b.onclick=win.guard(()=>{
    fileMenu.style.display='none';
    const a=b.dataset.fp;
    const dataUrl=canvas.toDataURL('image/png');
    if(a==='save'){
      if(curFile&&FS.get(curFile)){
        const n=FS.get(curFile); n.content=dataUrl; n.size=dataUrl.length; FS.save(n);
        notify('Saved',curFileName,'💾');
      }else{
        filePicker({mode:'save',title:'Save Drawing',filter:['.png'],defName:'My Drawing.png',startFolder:'pictures',onSelect:async r=>{
          const n=await FS.createFile(r.folder,FS.uniqueName(r.folder,r.name),dataUrl,'image');
          curFile=n.id; curFileName=r.name;
          notify('Saved',r.name,'💾');
        }});
      }
    }else if(a==='saveas'){
      filePicker({mode:'save',title:'Save Drawing As',filter:['.png'],defName:curFileName||'My Drawing.png',startFolder:'pictures',onSelect:async r=>{
        const n=await FS.createFile(r.folder,FS.uniqueName(r.folder,r.name),dataUrl,'image');
        curFile=n.id; curFileName=r.name;
        notify('Saved',r.name,'💾');
      }});
    }else if(a==='open'){
      filePicker({mode:'open',title:'Open Image',filter:['.png','.jpg','.jpeg','.gif','.webp','.bmp','.svg','.heic','.tiff','.tif','.ico','.avif'],onSelect:node=>{
        if(node.content&&(node.content.startsWith('data:')||node.kind==='image')){
          const img=new Image();
          img.onload=()=>{
            ctx.clearRect(0,0,W,H);
            const sx=Math.min(1,W/img.width),sy=Math.min(1,H/img.height),s=Math.min(sx,sy);
            const dx=(W-img.width*s)/2,dy=(H-img.height*s)/2;
            ctx.drawImage(img,dx,dy,img.width*s,img.height*s);
            saveState();
            curFile=node.id; curFileName=node.name;
            notify('Opened',node.name,'📂');
          };
          img.src=node.content;
        }
      }});
    }
  }));

  $$('[data-a]',root).forEach(b=>b.onclick=win.guard(()=>{
    const a=b.dataset.a;
    if(a==='undo')undo();
    else if(a==='redo')redo();
    else if(a==='clear'){
      showDialog({icon:'🗑',title:'Clear Canvas',body:'Erase everything?',buttons:[
        {label:'Cancel'},
        {label:'Clear',primary:true,onClick:()=>{ ctx.fillStyle='#fff'; ctx.fillRect(0,0,W,H); saveState(); }}
      ]});
    }
  }));
}
