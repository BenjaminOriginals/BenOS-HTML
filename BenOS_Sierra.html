<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BenOS 13.0 Beta 4</title>
<!--
  ============================================================================
  BenOS 13.0 Beta 4 — a complete browser-based operating system in a single file.
  Sections:  SYSTEM CORE · BOOT · LOGIN · DESKTOP · WINDOW MANAGER · FILE SYSTEM
             APPLICATION ENGINE · DOCK · NOTIFICATIONS · ERROR HANDLER
             SETTINGS · PREINSTALLED APPS · TERMINAL · UTILITY FUNCTIONS
  Storage:   IndexedDB (virtual file system + system metadata)
  Style:     macOS High Sierra
  ============================================================================
-->
<style>
/* ===================================================================== */
/* GLOBAL / RESET                                                          */
/* ===================================================================== */
*{margin:0;padding:0;box-sizing:border-box;-webkit-user-select:none;user-select:none;-webkit-font-smoothing:antialiased;}
html,body{width:100%;height:100%;overflow:hidden;font-family:-apple-system,"SF Pro Text","Helvetica Neue",Helvetica,Arial,sans-serif;color:#1d1d1f;background:#000;}
:root{
  --accent:#2f7cf6;
  --menubar-h:24px;
  --dock-bg:rgba(255,255,255,.28);
  --win-radius:11px;
}
input,textarea{-webkit-user-select:text;user-select:text;font-family:inherit;}
button{font-family:inherit;cursor:default;border:none;background:none;}
::-webkit-scrollbar{width:9px;height:9px;}
::-webkit-scrollbar-thumb{background:rgba(0,0,0,.28);border-radius:6px;border:2px solid transparent;background-clip:content-box;}
::-webkit-scrollbar-track{background:transparent;}

/* ===================================================================== */
/* BOOT SCREEN                                                             */
/* ===================================================================== */
#boot{position:fixed;inset:0;background:#000;z-index:9000;display:flex;flex-direction:column;align-items:center;justify-content:center;transition:opacity .8s ease;}
#boot .logo{width:110px;height:110px;margin-bottom:54px;display:flex;align-items:center;justify-content:center;}
#boot .logo img{width:110px;height:110px;object-fit:contain;border-radius:24px;}
#boot .brand{display:none;}
@keyframes bootpulse{0%,100%{opacity:.85;transform:scale(1);}50%{opacity:1;transform:scale(1.04);}}
.progress{width:210px;height:6px;background:rgba(255,255,255,.18);border-radius:4px;overflow:hidden;}
.progress > i{display:block;height:100%;width:0%;background:#e7e7e7;border-radius:4px;transition:width .25s ease;}

/* ===================================================================== */
/* LOGIN SCREEN                                                            */
/* ===================================================================== */
#login{position:fixed;inset:0;z-index:8000;display:none;flex-direction:column;align-items:center;justify-content:center;
  background:#0b1220 center/cover no-repeat;transition:opacity .7s ease;}
#login::before{content:"";position:absolute;inset:0;background:rgba(0,0,0,.45);backdrop-filter:blur(28px);-webkit-backdrop-filter:blur(28px);}
#login .panel{position:relative;display:flex;flex-direction:column;align-items:center;}
#login .avatar{width:120px;height:120px;border-radius:50%;background:linear-gradient(160deg,#dfe6f3,#9fb4d8);display:flex;align-items:center;justify-content:center;font-size:60px;color:#fff;box-shadow:0 6px 30px rgba(0,0,0,.5);overflow:hidden;}
#login .uname{color:#fff;font-size:22px;font-weight:500;margin:18px 0 16px;text-shadow:0 1px 6px rgba(0,0,0,.6);}
#login .pwrow{display:flex;align-items:center;gap:8px;}
#login input{width:220px;height:34px;border-radius:18px;border:none;padding:0 16px;background:rgba(255,255,255,.9);font-size:14px;outline:none;text-align:center;}
#login .go{width:34px;height:34px;border-radius:50%;background:rgba(255,255,255,.85);font-size:16px;color:#333;display:flex;align-items:center;justify-content:center;cursor:pointer;}
#login .go:hover{background:#fff;}
#login .hint{color:#cfd6e4;font-size:12px;margin-top:18px;}
#login .shake{animation:shake .4s;}
@keyframes shake{0%,100%{transform:translateX(0);}20%,60%{transform:translateX(-9px);}40%,80%{transform:translateX(9px);}}
.userpick{position:relative;display:flex;gap:30px;margin-bottom:30px;flex-wrap:wrap;justify-content:center;max-width:560px;}
.upick{display:flex;flex-direction:column;align-items:center;gap:8px;cursor:pointer;opacity:.55;transition:opacity .15s,transform .15s;}
.upick.sel{opacity:1;transform:scale(1.06);}
.upick .uav{width:80px;height:80px;border-radius:50%;background:linear-gradient(160deg,#dfe6f3,#9fb4d8);display:flex;align-items:center;justify-content:center;font-size:40px;color:#fff;box-shadow:0 5px 20px rgba(0,0,0,.45);}
.upick.sel .uav{box-shadow:0 6px 26px rgba(0,0,0,.55),0 0 0 3px rgba(255,255,255,.75);}
.upick .un{color:#fff;font-size:13px;text-shadow:0 1px 4px rgba(0,0,0,.65);}

/* ===================================================================== */
/* DESKTOP                                                                 */
/* ===================================================================== */
#desktop{position:fixed;inset:0;z-index:10;display:none;opacity:0;transition:opacity .8s ease;background-size:cover;background-position:center;}
#wall-overlay{position:absolute;inset:0;pointer-events:none;}

/* Menu bar */
#menubar{position:fixed;top:0;left:0;right:0;height:var(--menubar-h);z-index:6000;display:flex;align-items:center;
  background:rgba(245,245,247,.55);backdrop-filter:blur(22px) saturate(180%);-webkit-backdrop-filter:blur(22px) saturate(180%);
  border-bottom:1px solid rgba(0,0,0,.08);font-size:13px;padding:0 8px;color:#1d1d1f;transition:transform .25s cubic-bezier(.25,.46,.45,.94);}
#menubar.mbar-hide{transform:translateY(-24px);pointer-events:none;}
#menubar .mb-left{display:flex;align-items:center;gap:2px;flex:1;height:100%;}
#menubar .mb-right{display:flex;align-items:center;gap:14px;height:100%;}
.mb-item{padding:2px 9px;border-radius:4px;height:18px;line-height:14px;display:flex;align-items:center;cursor:default;}
.mb-item:hover,.mb-item.active{background:var(--accent);color:#fff;}
.mb-item.apple{font-size:15px;padding:1px 9px;}
.mb-item.apple img{width:16px;height:16px;object-fit:contain;border-radius:4px;display:block;}
.mb-item.bold{font-weight:600;}
.mb-right .mb-stat{display:flex;align-items:center;gap:5px;cursor:default;padding:2px 5px;border-radius:4px;}
.mb-right .mb-stat:hover{background:rgba(0,0,0,.08);}
#mb-clock{font-variant-numeric:tabular-nums;}

/* desktop icon layer */
#icon-layer{position:absolute;inset:0;top:var(--menubar-h);z-index:20;}
.desk-icon{position:absolute;width:90px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 4px;border-radius:7px;cursor:default;text-align:center;}
.desk-icon.sel{background:rgba(120,170,255,.30);outline:1px solid rgba(120,170,255,.55);}
.desk-icon .ic{width:54px;height:54px;display:flex;align-items:center;justify-content:center;filter:drop-shadow(0 2px 3px rgba(0,0,0,.35));}
.desk-icon .nm{font-size:12px;color:#fff;text-shadow:0 1px 3px rgba(0,0,0,.85),0 0 2px rgba(0,0,0,.6);max-width:86px;word-break:break-word;line-height:14px;padding:0 2px;border-radius:3px;}
.desk-icon.sel .nm{background:var(--accent);text-shadow:none;}

/* generic icon glyph blocks */
.ico{display:flex;align-items:center;justify-content:center;border-radius:13px;font-size:26px;color:#fff;background-size:cover;background-position:center;}
.ico.folder{background:linear-gradient(160deg,#7ec5ff,#3a86e0);border-radius:9px;}
.ico.txt{background:#fff;color:#5a6b86;border-radius:7px;border:1px solid #d7dbe2;font-size:22px;}
.ico.image{background:#dfe6ef;border-radius:7px;}
.ico.audio{background:linear-gradient(160deg,#ff6a88,#ff2d55);}
.ico.video{background:linear-gradient(160deg,#5a6a8c,#2c3550);}
.ico.pdf{background:linear-gradient(160deg,#ff7b6b,#e23b2e);}
.ico.zip{background:linear-gradient(160deg,#ffd479,#f2a93b);color:#7a5310;}
.ico.generic{background:#fff;color:#7b8794;border-radius:7px;border:1px solid #d7dbe2;}
.ico.app{font-weight:700;}

/* ===================================================================== */
/* WINDOW MANAGER                                                          */
/* ===================================================================== */
#window-layer{position:absolute;inset:0;top:var(--menubar-h);z-index:100;pointer-events:none;}
.window{position:absolute;min-width:260px;min-height:160px;background:#f6f6f6;border-radius:var(--win-radius);
  box-shadow:0 22px 70px rgba(0,0,0,.40),0 0 0 .5px rgba(0,0,0,.18);display:flex;flex-direction:column;overflow:hidden;pointer-events:auto;
  opacity:0;transform:translateY(24px);transition:opacity .18s ease,transform .25s cubic-bezier(.25,.46,.45,.94);}
.window.show{opacity:1;transform:translateY(0);}
/* minimize: genie-like shrink toward the dock */
.window.min{opacity:0;transform:scale(.12) translateY(70vh) rotateX(12deg);pointer-events:none;transition:opacity .32s ease,transform .42s cubic-bezier(.5,0,.7,.2);}
.window.maxd{border-radius:0;}
/* smooth maximize / restore (added only during the toggle, so manual drag-resize stays instant) */
.window.win-anim{transition:width .26s cubic-bezier(.3,.9,.3,1),height .26s cubic-bezier(.3,.9,.3,1),left .26s cubic-bezier(.3,.9,.3,1),top .26s cubic-bezier(.3,.9,.3,1),border-radius .26s ease,opacity .18s ease,transform .2s ease;}
/* Windows-style title bar: title on the left, control buttons on the right */
.titlebar{height:34px;flex:0 0 34px;display:flex;align-items:stretch;cursor:default;
  background:linear-gradient(180deg,#fbfbfb,#eef0f2);border-bottom:1px solid #d3d3d6;position:relative;}
.titlebar .title{flex:1;display:flex;align-items:center;padding:0 12px;font-size:13px;font-weight:600;color:#3a3a3d;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;min-width:0;}
.titlebar .wctrls{display:flex;align-items:stretch;flex:0 0 auto;}
.wbtn{width:46px;display:flex;align-items:center;justify-content:center;color:#4a4a4d;cursor:pointer;transition:background .1s ease,color .1s ease;}
.wbtn:hover{background:rgba(0,0,0,.09);}
.wbtn.close:hover{background:#e81123;color:#fff;}
.wbtn svg{display:block;}
.win-body{flex:1;overflow:auto;position:relative;background:#fff;}
.window.blur .titlebar{background:#f3f3f4;}
.window.blur .title{color:#a6a6a9;}
.window.blur .wbtn{color:#b0b0b3;}
.resz{position:absolute;z-index:5;}
.resz.n{top:-3px;left:8px;right:8px;height:6px;cursor:ns-resize;}
.resz.s{bottom:-3px;left:8px;right:8px;height:6px;cursor:ns-resize;}
.resz.e{right:-3px;top:8px;bottom:8px;width:6px;cursor:ew-resize;}
.resz.w{left:-3px;top:8px;bottom:8px;width:6px;cursor:ew-resize;}
.resz.ne{top:-3px;right:-3px;width:12px;height:12px;cursor:nesw-resize;}
.resz.nw{top:-3px;left:-3px;width:12px;height:12px;cursor:nwse-resize;}
.resz.se{bottom:-3px;right:-3px;width:14px;height:14px;cursor:nwse-resize;}
.resz.sw{bottom:-3px;left:-3px;width:12px;height:12px;cursor:nesw-resize;}
.win-body iframe{width:100%;height:100%;border:none;background:#fff;}

/* ===================================================================== */
/* DOCK                                                                    */
/* ===================================================================== */
#dock-wrap{position:fixed;left:0;right:0;bottom:6px;z-index:5500;display:flex;justify-content:center;pointer-events:none;transition:transform .25s cubic-bezier(.25,.46,.45,.94);}
#dock-wrap.dock-hide{transform:translateY(80px);pointer-events:none;}
#dock{pointer-events:auto;display:flex;align-items:flex-end;gap:6px;padding:7px 10px;border-radius:18px;
  background:var(--dock-bg);backdrop-filter:blur(26px) saturate(180%);-webkit-backdrop-filter:blur(26px) saturate(180%);
  box-shadow:0 10px 36px rgba(0,0,0,.32),inset 0 0 0 .5px rgba(255,255,255,.5);transition:padding .15s;}
.dock-item{position:relative;width:52px;height:52px;display:flex;align-items:flex-end;justify-content:center;transform-origin:bottom center;cursor:default;}
.dock-item.dock-ease{transition:width .22s cubic-bezier(.2,.8,.3,1),height .22s cubic-bezier(.2,.8,.3,1);}
.dock-item.dock-ease .ico{transition:width .22s cubic-bezier(.2,.8,.3,1),height .22s cubic-bezier(.2,.8,.3,1),font-size .22s;}
.dock-item .ico{width:52px;height:52px;font-size:26px;box-shadow:0 4px 9px rgba(0,0,0,.3);}
.dock-item .run{position:absolute;bottom:-5px;left:50%;transform:translateX(-50%);width:4px;height:4px;border-radius:50%;background:rgba(0,0,0,.55);opacity:0;}
.dock-item.running .run{opacity:1;}
.dock-item .tip{position:absolute;bottom:64px;left:50%;transform:translateX(-50%);background:rgba(245,245,247,.96);color:#222;font-size:12px;padding:3px 9px;border-radius:6px;white-space:nowrap;box-shadow:0 4px 14px rgba(0,0,0,.25);opacity:0;pointer-events:none;transition:opacity .1s;border:.5px solid rgba(0,0,0,.1);}
.dock-item:hover .tip{opacity:1;}
.dock-sep{width:1px;height:46px;background:rgba(0,0,0,.18);margin:0 2px;align-self:center;}
.dock-item.drop-hot{transform:scale(1.25) translateY(-6px) !important;}
.dock-item.drop-hot .ico{box-shadow:0 0 0 3px rgba(255,69,58,.7),0 6px 16px rgba(0,0,0,.35) !important;}

/* ===================================================================== */
/* CONTEXT MENU                                                            */
/* ===================================================================== */
#ctx-root{position:fixed;inset:0;z-index:7000;display:none;}
.ctx-menu{position:absolute;min-width:200px;background:rgba(246,246,247,.97);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:7px;box-shadow:0 12px 40px rgba(0,0,0,.32),0 0 0 .5px rgba(0,0,0,.16);padding:5px;font-size:13px;}
.ctx-item{padding:4px 12px 5px;border-radius:5px;display:flex;align-items:center;justify-content:space-between;gap:18px;color:#1d1d1f;white-space:nowrap;position:relative;}
.ctx-item:hover{background:var(--accent);color:#fff;}
.ctx-item.disabled{color:#b6b6b9;}
.ctx-item.disabled:hover{background:transparent;color:#b6b6b9;cursor:default;}
.ctx-item .arrow{font-size:10px;opacity:.6;}
.ctx-sep{height:1px;background:rgba(0,0,0,.12);margin:5px 8px;}
.ctx-item .sub{display:none;}

/* ===================================================================== */
/* NOTIFICATIONS                                                           */
/* ===================================================================== */
#toast-layer{position:fixed;top:30px;right:12px;z-index:7500;display:flex;flex-direction:column;gap:9px;width:330px;pointer-events:none;}
.toast{background:rgba(250,250,252,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-radius:13px;padding:11px 13px;display:flex;gap:11px;box-shadow:0 10px 34px rgba(0,0,0,.28);transform:translateX(360px);transition:transform .35s cubic-bezier(.2,.8,.2,1);pointer-events:auto;border:.5px solid rgba(0,0,0,.07);}
.toast.show{transform:translateX(0);}
.toast .tic{width:34px;height:34px;border-radius:8px;display:flex;align-items:center;justify-content:center;font-size:18px;flex:0 0 34px;}
.toast .tx{flex:1;min-width:0;}
.toast .tt{font-size:13px;font-weight:600;margin-bottom:1px;}
.toast .tb{font-size:12px;color:#4a4a4d;line-height:15px;word-break:break-word;}

#notif-center{position:fixed;top:0;right:-380px;bottom:0;width:360px;z-index:6500;background:rgba(30,30,34,.62);backdrop-filter:blur(34px) saturate(160%);-webkit-backdrop-filter:blur(34px) saturate(160%);
  transition:right .32s cubic-bezier(.2,.8,.2,1);padding:34px 14px 14px;color:#fff;display:flex;flex-direction:column;border-left:.5px solid rgba(255,255,255,.16);}
#notif-center.open{right:0;}
#notif-center h2{font-size:19px;font-weight:700;margin:6px 4px 14px;}
#notif-list{flex:1;overflow:auto;display:flex;flex-direction:column;gap:9px;}
.nc-item{background:rgba(255,255,255,.13);border-radius:13px;padding:11px 13px;}
.nc-item .tt{font-size:13px;font-weight:600;}
.nc-item .tb{font-size:12px;opacity:.85;margin-top:2px;}
.nc-item .tm{font-size:11px;opacity:.55;margin-top:5px;}
.nc-empty{opacity:.6;text-align:center;margin-top:40px;font-size:13px;}
.nc-clear{align-self:center;margin-top:10px;font-size:12px;background:rgba(255,255,255,.16);padding:6px 16px;border-radius:14px;cursor:pointer;color:#fff;}

/* ===================================================================== */
/* SPOTLIGHT                                                               */
/* ===================================================================== */
#spotlight{position:fixed;inset:0;z-index:7200;display:none;align-items:flex-start;justify-content:center;padding-top:16vh;background:rgba(0,0,0,.18);}
#spot-box{width:560px;background:rgba(245,245,247,.92);backdrop-filter:blur(28px) saturate(180%);-webkit-backdrop-filter:blur(28px) saturate(180%);border-radius:13px;box-shadow:0 24px 70px rgba(0,0,0,.4),0 0 0 .5px rgba(0,0,0,.15);overflow:hidden;}
#spot-input{width:100%;height:56px;font-size:22px;padding:0 20px 0 54px;border:none;background:transparent url('data:image/svg+xml;utf8,<svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" fill="gray" viewBox="0 0 16 16"><path d="M11.7 10.3a5.5 5.5 0 1 0-1.4 1.4l3.3 3.3 1.4-1.4-3.3-3.3zM3 6.5a3.5 3.5 0 1 1 7 0 3.5 3.5 0 0 1-7 0z"/></svg>') no-repeat 18px center;outline:none;color:#111;}
#spot-results{max-height:380px;overflow:auto;border-top:1px solid rgba(0,0,0,.1);}
.spot-row{display:flex;align-items:center;gap:12px;padding:8px 16px;cursor:default;}
.spot-row.sel{background:var(--accent);color:#fff;}
.spot-row .ico{width:30px;height:30px;font-size:15px;}
.spot-row .meta{font-size:11px;opacity:.6;margin-left:auto;}
.spot-row.sel .meta{opacity:.85;}

/* ===================================================================== */
/* SYSTEM ERROR / CRASH                                                    */
/* ===================================================================== */
#fatal{position:fixed;inset:0;z-index:9500;background:#000;display:none;flex-direction:column;align-items:center;justify-content:center;color:#fff;text-align:center;padding:40px;}
#fatal h1{font-size:42px;font-weight:700;margin-bottom:24px;}
#fatal .err{font-size:16px;color:#ff6b6b;max-width:640px;line-height:1.5;}
#fatal .sub{font-size:13px;color:#888;margin-top:28px;}
#fatal .restart{margin-top:30px;background:#fff;color:#000;padding:10px 26px;border-radius:8px;font-size:14px;cursor:pointer;}

/* generic modal dialog (crash / about / alerts) */
.dialog{position:fixed;z-index:7300;min-width:340px;max-width:440px;background:#f4f4f5;border-radius:12px;box-shadow:0 30px 80px rgba(0,0,0,.5),0 0 0 .5px rgba(0,0,0,.2);padding:22px;text-align:center;left:50%;top:42%;transform:translate(-50%,-50%);}
.dialog .dic{font-size:46px;margin-bottom:10px;}
.dialog h3{font-size:16px;font-weight:700;margin-bottom:8px;}
.dialog p{font-size:13px;color:#444;line-height:1.5;margin-bottom:8px;word-break:break-word;white-space:pre-line;}
.dialog .code{font-family:Menlo,monospace;font-size:12px;background:#e6e6e8;border-radius:6px;padding:8px 10px;color:#b3261e;margin:6px 0 16px;word-break:break-word;}
.dialog .row{display:flex;gap:10px;justify-content:center;}
.dialog button.btn{background:var(--accent);color:#fff;padding:7px 22px;border-radius:7px;font-size:13px;cursor:pointer;}
.dialog button.btn.sec{background:#dcdce0;color:#1d1d1f;}

/* shared UI helpers used by apps */
.flexcol{display:flex;flex-direction:column;height:100%;}
.toolbar{display:flex;align-items:center;gap:8px;padding:7px 10px;background:linear-gradient(180deg,#fafafa,#ececee);border-bottom:1px solid #d7d7da;flex:0 0 auto;}

/* ===================================================================== */
/* GLOBAL APP ANIMATIONS                                                   */
/* ===================================================================== */
@keyframes fadeInUp{from{opacity:0;transform:translateY(14px);}to{opacity:1;transform:translateY(0);}}
@keyframes fadeIn{from{opacity:0;}to{opacity:1;}}
@keyframes slideInLeft{from{opacity:0;transform:translateX(-18px);}to{opacity:1;transform:translateX(0);}}
@keyframes popIn{0%{opacity:0;transform:scale(.8);}60%{transform:scale(1.04);}100%{opacity:1;transform:scale(1);}}
@keyframes spinPulse{0%{transform:rotate(0) scale(1);}50%{transform:rotate(180deg) scale(1.12);}100%{transform:rotate(360deg) scale(1);}}
@keyframes ringFill{from{stroke-dashoffset:var(--c);}to{stroke-dashoffset:var(--off);}}
@keyframes barGrow{from{transform:scaleY(0);}to{transform:scaleY(1);}}
@keyframes shimmer{0%{background-position:-200% 0;}100%{background-position:200% 0;}}
@keyframes pulse{0%,100%{transform:scale(1);}50%{transform:scale(1.06);}}
@keyframes wave{0%,100%{transform:translateY(0);}50%{transform:translateY(-5px);}}
@keyframes glowPing{0%{box-shadow:0 0 0 0 rgba(48,124,246,.45);}70%{box-shadow:0 0 0 10px rgba(48,124,246,0);}100%{box-shadow:0 0 0 0 rgba(48,124,246,0);}}

/* Settings nav + cards animate in */
.snav{transition:background .18s ease,color .18s ease,transform .12s ease,box-shadow .18s ease;}
.snav:hover{background:rgba(120,170,255,.22) !important;transform:translateX(3px);}
.set-card{animation:fadeInUp .42s cubic-bezier(.2,.8,.25,1) both;}
.set-card:nth-child(2){animation-delay:.07s;}
.set-card:nth-child(3){animation-delay:.14s;}
.set-card:nth-child(4){animation-delay:.21s;}
.set-card:nth-child(5){animation-delay:.28s;}
.wp{transition:transform .18s ease,border-color .18s ease,box-shadow .18s ease;}
.wp:hover{transform:scale(1.06) translateY(-2px);box-shadow:0 6px 18px rgba(0,0,0,.22);}
.tbtn{transition:background .14s ease,transform .1s ease,box-shadow .14s ease;}
.tbtn:hover{transform:translateY(-1px);box-shadow:0 2px 6px rgba(0,0,0,.12);}
.tbtn:active{transform:translateY(0) scale(.97);}

/* BenMusic animations */
.mrow{transition:background .16s ease,transform .12s ease;animation:slideInLeft .3s ease both;}
.mrow:hover{background:#fff4f7 !important;transform:translateX(4px);}
.mside{transition:background .16s ease,transform .12s ease;}
.mside:hover{transform:translateX(3px);}
.music-eq{display:inline-flex;align-items:flex-end;gap:2px;height:14px;}

<script>
"use strict";
/* ===================================================================== */
/* SYSTEM CORE — globals, utilities                                        */
/* ===================================================================== */
const BENOS = {
  version:"13.0 Beta 4",
  build:"13.0 Beta 4",
  user:"Ben User",
  logo:"https://yt3.googleusercontent.com/-znaq5oM9pnqWOLOXj4ATespUfmaGw9sYsVrwssVLpFrqg-Eo66obj-9C0rhAdPYhPDp3xFF=s160-c-k-c0x00ffffff-no-rj",
  defaultWallpaper:"data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1920'%20height='1080'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='0'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%232d1b4e'/%3E%3Cstop%20offset='.4'%20stop-color='%23a4503a'/%3E%3Cstop%20offset='.7'%20stop-color='%23d28c4a'/%3E%3Cstop%20offset='1'%20stop-color='%23e8b86a'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='1920'%20height='1080'%20fill='url(%23g)'/%3E%3C/svg%3E",
  oldWallpapers:["https://www.ejemplos.co/wp-content/uploads/2019/01/Sierra-e1547501206553.jpg","https://images.unsplash.com/photo-1483728642387-6c3bdd6c93e5?auto=format&fit=crop&w=1920&q=80"],
  fallbackWallpaper:"data:image/svg+xml;charset=utf-8,%3Csvg%20xmlns='http://www.w3.org/2000/svg'%20width='1920'%20height='1080'%3E%3Cdefs%3E%3ClinearGradient%20id='g'%20x1='0'%20y1='0'%20x2='1'%20y2='1'%3E%3Cstop%20offset='0'%20stop-color='%231e3c72'/%3E%3Cstop%20offset='1'%20stop-color='%232a5298'/%3E%3C/linearGradient%3E%3C/defs%3E%3Crect%20width='1920'%20height='1080'%20fill='url(%23g)'/%3E%3C/svg%3E",
  booted:false,
  volume:0.8,
  muted:false,
};
const $  = (s,r=document)=>r.querySelector(s);
const $$ = (s,r=document)=>Array.from(r.querySelectorAll(s));
const el = (tag,cls,html)=>{const e=document.createElement(tag);if(cls)e.className=cls;if(html!=null)e.innerHTML=html;return e;};
const uid = ()=> 'n'+(crypto.getRandomValues(new Uint32Array(2)).join(''))+(performance.now()|0).toString(36);
const now = ()=>Date.now();
const esc = s=>String(s==null?'':s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));
function fmtSize(b){if(b==null)return '--';if(b<1024)return b+' B';if(b<1048576)return (b/1024).toFixed(1)+' KB';if(b<1073741824)return (b/1048576).toFixed(1)+' MB';return (b/1073741824).toFixed(2)+' GB';}
function fmtDate(t){if(!t)return '--';const d=new Date(t);return d.toLocaleDateString('en-US',{year:'numeric',month:'short',day:'numeric'})+' '+d.toLocaleTimeString('en-US',{hour:'2-digit',minute:'2-digit'});}
function extOf(name){const i=name.lastIndexOf('.');return i<0?'':name.slice(i+1).toLowerCase();}

/* file kind from extension/mime */
function kindFromName(name,mime){
  const e=extOf(name);
  if(['png','jpg','jpeg','gif','webp','bmp','svg','heic','tiff','tif','ico','avif','jfif','pjpeg','pjp','svgz','psd','raw','cr2','nef','orf'].includes(e))return 'image';
  if(['mp3','wav','ogg','m4a','aac','flac'].includes(e))return 'audio';
  if(['mp4','webm','mov','avi','mkv'].includes(e))return 'video';
  if(e==='pdf')return 'pdf';
  if(['zip','rar','7z','tar','gz'].includes(e))return 'zip';
  if(['txt','md','log','rtf','csv','json','js','css','html','htm','xml'].includes(e))return 'txt';
  if(mime){if(mime.startsWith('image/'))return 'image';if(mime.startsWith('audio/'))return 'audio';if(mime.startsWith('video/'))return 'video';}
  return 'generic';
}

/* ===================================================================== */
/* ERROR HANDLER — recoverable, fatal, app crash                          */
/* ===================================================================== */
let errThrottle=0;
function benFatal(msg){
  try{
    $('#desktop').style.display='none';
    $('#menubar').style.display='none';
    $('#dock-wrap').style.display='none';
    $('#boot').style.display='none';
    $('#login').style.display='none';
  }catch(e){}
  $('#fatal-msg').textContent = msg||'Unknown fatal error';
  $('#fatal').style.display='flex';
}
function benRecoverable(msg){
  // small system error — show dialog, keep running
  showDialog({
    icon:'⚠️', title:'System Error',
    body:'BenOS detected an error and recovered successfully.',
    code:String(msg||'Unknown error'),
    buttons:[{label:'OK',primary:true}]
  });
  try{ playSound('alert'); }catch(e){}
  try{ notify('System Error','Recovered: '+msg,'⚠️'); }catch(e){}
}
// global capture for uncaught errors -> recoverable
window.addEventListener('error',function(ev){
  if(!BENOS.booted) return;
  const t=now(); if(t-errThrottle<800){return;} errThrottle=t;
  const m=ev.error&&ev.error.message?ev.error.message:(ev.message||'Unknown error');
  benRecoverable(m);
});
window.addEventListener('unhandledrejection',function(ev){
  if(!BENOS.booted) return;
  const t=now(); if(t-errThrottle<800){return;} errThrottle=t;
  const m=ev.reason&&ev.reason.message?ev.reason.message:String(ev.reason||'Unhandled rejection');
  benRecoverable(m);
});

/* generic dialog builder */
function showDialog(opt){
  const d=el('div','dialog');
  let html='';
  if(opt.icon)html+='<div class="dic">'+opt.icon+'</div>';
  if(opt.title)html+='<h3>'+esc(opt.title)+'</h3>';
  if(opt.body)html+='<p>'+esc(opt.body)+'</p>';
  if(opt.code)html+='<div class="code">'+esc(opt.code)+'</div>';
  html+='<div class="row"></div>';
  d.innerHTML=html;
  const row=$('.row',d);
  (opt.buttons||[{label:'OK',primary:true}]).forEach(b=>{
    const bt=el('button','btn'+(b.primary?'':' sec'),esc(b.label));
    bt.onclick=()=>{ d.remove(); if(b.onClick)try{b.onClick();}catch(e){} };
    row.appendChild(bt);
  });
  document.body.appendChild(d);
  return d;
}

/* small text / password prompt dialog (returns value via callback) */
function promptText(title,label,def,isPassword,onOk){
  const inp=el('input'); inp.id='pt-inp'; if(isPassword)inp.type='password'; inp.value=def||'';
  inp.style.cssText='width:100%;padding:7px 10px;border:1px solid #c4c4c8;border-radius:6px;font-size:13px;margin-top:6px;';
  const d=showDialog({icon:'✏️',title:title,body:label,buttons:[{label:'Cancel'},{label:'OK',primary:true,onClick:()=>{ try{onOk(inp.value);}catch(e){benRecoverable(e.message||e);} }}]});
  const p=$('p',d); (p||$('h3',d)).after(inp); inp.focus(); inp.select();
  inp.onkeydown=e=>{ if(e.key==='Enter'){ d.remove(); try{onOk(inp.value);}catch(err){benRecoverable(err.message||err);} } };
  return d;
}

/* universal file picker dialog — mode: 'open' | 'save', filter: ['.png','.jpg',...], startFolder: id, onSelect: fn(node|{name,folder}) */
function filePicker(opt){
  const d=el('div');
  d.style.cssText='position:fixed;inset:0;z-index:8000;background:rgba(0,0,0,.35);display:flex;align-items:center;justify-content:center';
  const box=el('div');
  box.style.cssText='width:640px;height:460px;background:#f6f6f6;border-radius:10px;box-shadow:0 22px 70px rgba(0,0,0,.4);display:flex;flex-direction:column;overflow:hidden';
  let cwd=opt.startFolder||'desktop', curNode=null;
  const filter=opt.filter||[];
  const title=opt.title||(opt.mode==='save'?'Save':'Open');
  const isSave=opt.mode==='save';
  box.innerHTML=
    '<div style="display:flex;align-items:center;padding:8px 14px;background:#e8e8ea;border-bottom:1px solid #ccc;gap:8px;flex-shrink:0">'+
      '<span style="font-weight:600;font-size:13px;flex:1">'+esc(title)+'</span>'+
      '<button class="tbtn icon" data-fp="back" style="padding:2px 8px;font-size:12px">◀</button>'+
      '<button class="tbtn icon" data-fp="fwd" style="padding:2px 8px;font-size:12px">▶</button>'+
      '<span id="fp-path" style="font-size:12px;color:#555;font-weight:600;margin-left:4px"></span>'+
    '</div>'+
    '<div style="flex:1;display:flex;min-height:0">'+
      '<div id="fp-side" style="width:150px;flex:0 0 150px;background:#ededf0;border-right:1px solid #d7d7da;overflow-y:auto;padding:10px 8px;font-size:12px"></div>'+
      '<div style="flex:1;display:flex;flex-direction:column;min-width:0">'+
        '<div id="fp-main" style="flex:1;overflow-y:auto;background:#fff;padding:10px"></div>'+
      '</div>'+
    '</div>'+
    (isSave?'<div style="display:flex;align-items:center;gap:8px;padding:8px 14px;border-top:1px solid #ddd;background:#f3f3f5;flex-shrink:0"><span style="font-size:12px;color:#555;white-space:nowrap">Save As:</span><input id="fp-name" style="flex:1;padding:5px 8px;border:1px solid #ccc;border-radius:5px;font-size:13px;outline:none" value="'+(opt.defName||'untitled')+'"><button class="tbtn" id="fp-savebtn" style="background:#3a86e0;color:#fff;border-color:#2a76d0;font-weight:600;padding:4px 16px">Save</button></div>':'')+
    '<div style="display:flex;justify-content:flex-end;gap:6px;padding:8px 14px;border-top:1px solid #ddd;background:#f3f3f5;flex-shrink:0">'+
      '<button class="tbtn" id="fp-cancel" style="padding:4px 16px">Cancel</button>'+
      (!isSave?'<button class="tbtn" id="fp-openbtn" style="background:#3a86e0;color:#fff;border-color:#2a76d0;font-weight:600;padding:4px 16px">Open</button>':'')+
    '</div>';
  d.appendChild(box);
  document.body.appendChild(d);
  const main=$('#fp-main',box), side=$('#fp-side',box), pathEl=$('#fp-path',box);
  const hist=[cwd]; let hpos=0;
  function render(){
    const folder=FS.get(cwd)||FS.get('desktop'); cwd=folder.id;
    pathEl.textContent=FS.pathOf(cwd)==='/'?'Internal Disk':FS.pathOf(cwd);
    side.innerHTML='<div style="font-size:10px;color:#999;font-weight:700;margin:2px 4px 6px">FAVORITES</div>'+
      [['desktop','🖥','Desktop'],['documents','📄','Documents'],['downloads','⤓','Downloads'],['applications','📦','Applications'],['pictures','🖼','Pictures'],['music-folder','🎵','Music'],['trash','🗑','Trash'],['root','💽','Internal Disk']]
        .map(f=>'<div class="fav" data-id="'+f[0]+'" style="display:flex;gap:6px;padding:4px 6px;border-radius:4px;cursor:default;align-items:center'+(f[0]===cwd?';background:#d3d8e0':'')+'"><span>'+f[1]+'</span><span>'+f[2]+'</span></div>').join('');
    $$('.fav',side).forEach(f=>f.onclick=()=>{ cwd=f.dataset.id; hist.splice(hpos+1); hist.push(cwd); hpos=hist.length-1; render(); });
    let items=FS.children(cwd).sort((a,b)=>a.type===b.type?a.name.localeCompare(b.name):(a.type==='folder'?-1:1));
    if(filter.length) items=items.filter(n=>n.type==='folder'||filter.includes('.'+extOf(n.name).toLowerCase()));
    main.innerHTML='';
    const grid=el('div'); grid.style.cssText='display:flex;flex-wrap:wrap;gap:4px;align-content:flex-start';
    items.forEach(n=>{
      const t=el('div');
      t.style.cssText='width:80px;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border-radius:6px;cursor:default;text-align:center;font-size:11px';
      t.innerHTML='<div>'+iconHTML(n,36)+'</div><div style="word-break:break-word;line-height:13px;max-width:76px">'+esc(n.name)+'</div>';
      t.onmouseenter=()=>t.style.background='#eef3fc';
      t.onmouseleave=()=>t.style.background='';
      t.ondblclick=()=>{
        if(n.type==='folder'){ cwd=n.id; hist.splice(hpos+1); hist.push(cwd); hpos=hist.length-1; render(); }
        else if(!isSave){ curNode=n; d.remove(); if(opt.onSelect)opt.onSelect(n); }
      };
      t.onclick=()=>{ curNode=n; if(isSave){ const inp=$('#fp-name',box); if(inp)inp.value=n.name; } };
      grid.appendChild(t);
    });
    if(!items.length)grid.innerHTML='<div style="color:#aaa;padding:20px;width:100%;text-align:center;font-size:12px">This folder is empty</div>';
    main.appendChild(grid);
  }
  $$('[data-fp]',box).forEach(b=>b.onclick=()=>{
    const a=b.dataset.fp;
    if(a==='back'&&hpos>0){hpos--;cwd=hist[hpos];render();}
    else if(a==='fwd'&&hpos<hist.length-1){hpos++;cwd=hist[hpos];render();}
  });
  if(isSave){
    const inp=$('#fp-name',box);
    inp.onkeydown=e=>{ if(e.key==='Enter'){ d.remove(); if(opt.onSelect)opt.onSelect({name:inp.value,folder:cwd}); }};
    $('#fp-savebtn',box).onclick=()=>{ d.remove(); if(opt.onSelect)opt.onSelect({name:inp.value,folder:cwd}); };
  }else{
    $('#fp-openbtn',box).onclick=()=>{
      if(curNode){ d.remove(); if(opt.onSelect)opt.onSelect(curNode); }
    };
  }
  $('#fp-cancel',box).onclick=()=>{ d.remove(); if(opt.onCancel)opt.onCancel(); };
  d.addEventListener('click',e=>{ if(e.target===d){ d.remove(); if(opt.onCancel)opt.onCancel(); }});
  render();
  return d;
}

/* APP CRASH — close the window, report error (per APPLICATION CRASH HANDLING) */
function appCrash(win, errMsg){
  const name = win&&win.appName ? win.appName : 'Application';
  try{ playSound('alert'); }catch(e){}
  try{ if(win) WM.close(win,true); }catch(e){}
  showDialog({
    icon:'💥', title:name+' Crashed',
    body:name+' crashed with the following error:',

<script>
/* ===================================================================== */
/* FILE SYSTEM — IndexedDB backed virtual file system                     */
/* ===================================================================== */
/*
  Storage layer with graceful degradation. IndexedDB is preferred, but in some
  contexts (file://, private/sandboxed windows, blocked site-data) the call
  `indexedDB.open()` throws "access to the Indexed Database API is denied".
  Rather than crash the whole OS, we fall back to localStorage, and finally to
  an in-memory store so BenOS always boots. The public interface
  (put/del/get/all on the 'fs' and 'meta' stores) is identical in every mode.
*/
const DB = {
  name:'BenOS_13_Beta_4', version:2, db:null,
  mode:'memory',                       // 'idb' | 'local' | 'memory'
  mem:{ fs:new Map(), meta:new Map(), assets:new Map() },// used by 'local' and 'memory' modes
  _quotaWarned:false,

  async open(){
    // 1) Try IndexedDB (best: large, persistent)
    try{
      DB.db = await DB._openIDB();
      DB.mode='idb';
      return DB.db;
    }catch(e){
      console.warn('BenOS: IndexedDB unavailable ('+(e&&e.message||e)+'). Falling back.');
    }
    // 2) Try localStorage (persistent, ~5MB)
    try{
      const probe='__benos_probe__';
      window.localStorage.setItem(probe,'1');
      window.localStorage.removeItem(probe);
      DB.mode='local';
      DB._loadLocal();
      return null;
    }catch(e){
      console.warn('BenOS: localStorage unavailable ('+(e&&e.message||e)+'). Using in-memory storage.');
    }
    // 3) In-memory (works always, not saved after the page closes)
    DB.mode='memory';
    return null;
  },

  _openIDB(){
    return new Promise((res,rej)=>{
      let done=false, req;
      try{
        if(typeof indexedDB==='undefined' || !indexedDB) throw new Error('IndexedDB not present');
        req=indexedDB.open(DB.name,DB.version);
      }catch(e){ return rej(e); }            // synchronous SecurityError (denied context)
      const to=setTimeout(()=>{ if(!done){done=true;rej(new Error('IndexedDB open timed out'));} },5000);
      req.onupgradeneeded=e=>{
        const db=e.target.result;
        if(!db.objectStoreNames.contains('fs')){const s=db.createObjectStore('fs',{keyPath:'id'});s.createIndex('parentId','parentId',{unique:false});}
        if(!db.objectStoreNames.contains('meta')){db.createObjectStore('meta',{keyPath:'key'});}
        if(!db.objectStoreNames.contains('assets')){db.createObjectStore('assets',{keyPath:'key'});} // large binary system assets (backgrounds/musics/sounds)
      };
      req.onsuccess=e=>{ if(done)return; done=true; clearTimeout(to); DB.db=e.target.result; res(DB.db); };
      req.onerror  =e=>{ if(done)return; done=true; clearTimeout(to); rej((e.target&&e.target.error)||new Error('IndexedDB open failed')); };
      req.onblocked=()=>{ /* wait for success or timeout */ };
    });
  },

  /* localStorage persistence helpers (store each table as one JSON blob) */
  _loadLocal(){
    try{ (JSON.parse(window.localStorage.getItem('benos_fs')||'[]')).forEach(n=>DB.mem.fs.set(n.id,n)); }catch(e){}
    try{ (JSON.parse(window.localStorage.getItem('benos_meta')||'[]')).forEach(m=>DB.mem.meta.set(m.key,m)); }catch(e){}
  },
  _saveLocal(){
    if(DB.mode!=='local') return;
    try{
      window.localStorage.setItem('benos_fs', JSON.stringify([...DB.mem.fs.values()]));
      window.localStorage.setItem('benos_meta', JSON.stringify([...DB.mem.meta.values()]));
    }catch(e){
      if(!DB._quotaWarned){ DB._quotaWarned=true; setTimeout(()=>{ try{ notify('Storage limit reached','Could not save — browser storage is full (large files exceed the localStorage limit).','⚠️'); }catch(_){} },50); }
    }
  },

  /* unified API ----------------------------------------------------------- */
  tx(store,mode){ return DB.db.transaction(store,mode).objectStore(store); },
  put(store,val){
    if(DB.mode==='idb') return new Promise((res,rej)=>{const r=DB.tx(store,'readwrite').put(val);r.onsuccess=()=>res(val);r.onerror=()=>rej(r.error);});
    DB.mem[store].set(store==='fs'?val.id:val.key, val); DB._saveLocal(); return Promise.resolve(val);
  },
  del(store,key){
    if(DB.mode==='idb') return new Promise((res,rej)=>{const r=DB.tx(store,'readwrite').delete(key);r.onsuccess=()=>res();r.onerror=()=>rej(r.error);});
    DB.mem[store].delete(key); DB._saveLocal(); return Promise.resolve();
  },
  get(store,key){
    if(DB.mode==='idb') return new Promise((res,rej)=>{const r=DB.tx(store,'readonly').get(key);r.onsuccess=()=>res(r.result);r.onerror=()=>rej(r.error);});
    return Promise.resolve(DB.mem[store].get(key));
  },
  all(store){
    if(DB.mode==='idb') return new Promise((res,rej)=>{const r=DB.tx(store,'readonly').getAll();r.onsuccess=()=>res(r.result||[]);r.onerror=()=>rej(r.error);});
    return Promise.resolve([...DB.mem[store].values()]);
  },
};

/* In-memory mirror of the file system for fast synchronous UI access. */
const FS = {
  nodes:new Map(),     // id -> node
  meta:new Map(),      // key -> value (system metadata)

  async load(){
    const arr = await DB.all('fs');
    FS.nodes.clear();
    arr.forEach(n=>FS.nodes.set(n.id,n));
    const m = await DB.all('meta');
    FS.meta.clear();
    m.forEach(x=>FS.meta.set(x.key,x.value));
    if(FS.nodes.size===0){ await FS.seed(); }
    // migrations (run on every boot to catch new apps)
    const r=FS.nodes.get('root');
    if(r && r.name==='Macintosh HD'){ r.name='Internal Disk'; await DB.put('fs',r); }
    const wp=FS.meta.get('wallpaper');
    if(wp && BENOS.oldWallpapers.includes(wp)){ FS.meta.set('wallpaper',null); await DB.put('meta',{key:'wallpaper',value:null}); }
    // ensure all system apps exist
    const sysApps=[['app-studios','BenStudios.html','studios'],['app-pen','BenPen.html','pen'],['app-benviewer','BenViewer.html','benviewer']];
    for(const [id,name,sys] of sysApps){
      if(!FS.nodes.get(id)){
        const n={id,parentId:'applications',name,type:'app',kind:'app',mime:'',size:0,content:'<!-- BenOS system application: '+sys+' -->',created:now(),modified:now(),systemApp:sys,dx:null,dy:null};
        FS.nodes.set(n.id,n); await DB.put('fs',n);
        const dock=FS.meta.get('dock')||[];
        if(!dock.includes(id)){ dock.splice(Math.max(0,dock.length-1),0,id); FS.meta.set('dock',dock); await DB.put('meta',{key:'dock',value:dock}); }
      }
    }
    // ensure Trash exists
    if(!FS.nodes.get('trash')){
      const t={id:'trash',parentId:'root',name:'Trash',type:'folder',kind:'folder',mime:'',size:0,content:'',created:now(),modified:now(),systemApp:null,dx:null,dy:null};
      FS.nodes.set(t.id,t); await DB.put('fs',t);
    }
  },

  /* metadata helpers */
  getMeta(k,def){ return FS.meta.has(k)?FS.meta.get(k):def; },
  async setMeta(k,v){ FS.meta.set(k,v); await DB.put('meta',{key:k,value:v}); },

  /* persistence of a single node */
  async save(n){ n.modified=n.modified||now(); FS.nodes.set(n.id,n); await DB.put('fs',n); return n; },

  get(id){ return FS.nodes.get(id); },
  children(pid){ return [...FS.nodes.values()].filter(n=>n.parentId===pid); },
  childByName(pid,name){ return [...FS.nodes.values()].find(n=>n.parentId===pid && n.name.toLowerCase()===String(name).toLowerCase()); },

  /* unique name within a folder (adds "copy"/number) */
  uniqueName(pid,name){
    if(!FS.childByName(pid,name))return name;
    const dot=name.lastIndexOf('.'); const base=dot>0?name.slice(0,dot):name; const ext=dot>0?name.slice(dot):'';
    let i=2,cand;
    do{ cand=base+' copy'+(i===2?'':' '+i)+ext; i++; }while(FS.childByName(pid,cand));
    return cand;
  },

  async createNode(opt){
    const n=Object.assign({
      id:uid(), parentId:opt.parentId, name:opt.name, type:opt.type||'file',
      kind:opt.kind||'generic', mime:opt.mime||'', size:opt.size||0,
      content:opt.content!=null?opt.content:'', created:now(), modified:now(),
      systemApp:opt.systemApp||null, dx:null, dy:null
    },opt.extra||{});
    if(n.type==='folder')n.kind='folder';
    await FS.save(n);
    return n;
  },

  async createFile(pid,name,content,kind){
    name=FS.uniqueName(pid,name);
    const k=kind||kindFromName(name);
    return FS.createNode({parentId:pid,name,type:'file',kind:k,content:content||'',size:(content||'').length});
  },
  async createFolder(pid,name){
    name=FS.uniqueName(pid,name||'untitled folder');
    return FS.createNode({parentId:pid,name,type:'folder'});
  },
  async rename(id,name){
    const n=FS.get(id); if(!n)return; n.name=name; n.modified=now(); await FS.save(n); return n;
  },
  async remove(id){
    const n=FS.get(id); if(!n)return;
    // recurse children
    for(const c of FS.children(id)){ await FS.remove(c.id); }
    FS.nodes.delete(id);
    await DB.del('fs',id);
  },
  async duplicate(id,toParent){
    const n=FS.get(id); if(!n)return;
    const pid = toParent||n.parentId;
    const copy=Object.assign({},n);
    copy.id=uid(); copy.parentId=pid; copy.name=FS.uniqueName(pid,n.name);
    copy.created=now(); copy.modified=now(); copy.dx=null; copy.dy=null;
    await FS.save(copy);
    // recurse children for folders
    if(n.type==='folder'){ for(const c of FS.children(id)){ await FS._dupInto(c.id,copy.id); } }
    return copy;
  },
  async _dupInto(id,newParent){
    const n=FS.get(id);
    const copy=Object.assign({},n);
    copy.id=uid(); copy.parentId=newParent; copy.created=now(); copy.modified=now();
    await FS.save(copy);
    if(n.type==='folder'){ for(const c of FS.children(id)){ await FS._dupInto(c.id,copy.id); } }
    return copy;
  },
  async move(id,toParent){
    const n=FS.get(id); if(!n||toParent===id)return;
    // prevent moving folder into its own descendant
    let p=toParent; while(p){ if(p===id)return; const pn=FS.get(p); p=pn?pn.parentId:null; }
    n.parentId=toParent; n.name=FS.uniqueName(toParent,n.name); n.dx=null;n.dy=null; n.modified=now();
    await FS.save(n); return n;
  },
  /* full path of a node */
  pathOf(id){
    const parts=[]; let n=FS.get(id);
    while(n && n.id!=='root'){ parts.unshift(n.name); n=FS.get(n.parentId); }
    return '/'+parts.join('/');
  },
  search(q){
    q=q.toLowerCase().trim(); if(!q)return [];
    return [...FS.nodes.values()].filter(n=>n.id!=='root'&&n.name.toLowerCase().includes(q)).slice(0,40);
  },

  /* recursive size / counts for storage info */
  stats(){
    let files=0,folders=0,bytes=0;
    FS.nodes.forEach(n=>{ if(n.id==='root')return; if(n.type==='folder')folders++; else{files++; bytes+=sizeOf(n);} });
    return {files,folders,bytes};
  },

  /* ---- default file system seed ---- */
  async seed(){
    const mk=(o)=>{const n=Object.assign({id:o.id||uid(),parentId:o.parentId,name:o.name,type:o.type||'file',kind:o.kind||(o.type==='folder'?'folder':kindFromName(o.name)),mime:o.mime||'',size:o.size||(o.content?o.content.length:0),content:o.content||'',created:now(),modified:now(),systemApp:o.systemApp||null,dx:o.dx??null,dy:o.dy??null},o.extra||{});FS.nodes.set(n.id,n);return n;};
    mk({id:'root',parentId:null,name:'Internal Disk',type:'folder'});
    mk({id:'desktop',parentId:'root',name:'Desktop',type:'folder'});
    mk({id:'documents',parentId:'root',name:'Documents',type:'folder'});
    mk({id:'downloads',parentId:'root',name:'Downloads',type:'folder'});
    mk({id:'music-folder',parentId:'root',name:'Music',type:'folder'});
    mk({id:'pictures',parentId:'root',name:'Pictures',type:'folder'});
    mk({id:'applications',parentId:'root',name:'Applications',type:'folder'});
    mk({id:'trash',parentId:'root',name:'Trash',type:'folder'});
    // system applications (HTML files that behave as executables)
    const apps=[['app-files','Files.html','files'],['app-settings','Settings.html','settings'],['app-browser','BenBrowser.html','browser'],['app-music','BenMusic.html','music'],['app-health','BenHealth.html','health'],['app-studios','BenStudios.html','studios'],['app-terminal','Terminal.html','terminal'],['app-pen','BenPen.html','pen'],['app-benviewer','BenViewer.html','benviewer']];
    apps.forEach(a=>mk({id:a[0],parentId:'applications',name:a[1],type:'app',kind:'app',systemApp:a[2],content:'<!-- BenOS system application: '+a[2]+' -->'}));
    // desktop content
    mk({parentId:'desktop',name:'Welcome.txt',content:'Welcome to BenOS 13.0 Beta 4!\n\nThis is a complete operating system running entirely in your browser.\n\nTry:\n• Double-click apps in the Dock\n• Right-click anything for context menus\n• Press Ctrl+Space for Search\n• Build apps with BenStudios\n• Drag files from your computer onto the desktop\n\nEnjoy!',dx:30,dy:20});
    mk({parentId:'desktop',name:'About BenOS.txt',content:'BenOS 13.0 Beta 4\n\nA single-file browser operating system.\nBuilt with HTML, CSS and JavaScript.\nNo frameworks. No external dependencies.',dx:30,dy:130});
    mk({parentId:'desktop',name:'Projects',type:'folder',dx:30,dy:240});
    mk({parentId:'documents',name:'Notes.txt',content:'My first note inside BenOS.'});
    mk({parentId:'documents',name:'TODO.txt',content:'1. Explore BenOS\n2. Try the Terminal\n3. Play some music'});
    // a sample drawn image so Pictures isn't empty
    mk({parentId:'pictures',name:'Sierra.txt',content:'Default wallpaper reference: macOS Sierra.'});
    // persist everything
    for(const n of FS.nodes.values()){ await DB.put('fs',n); }
    // default dock = system apps
    await FS.setMeta('dock',['app-files','app-browser','app-music','app-health','app-studios','app-pen','app-terminal','app-settings']);
    await FS.setMeta('wallpaper',null);
    await FS.setMeta('dockSize',52);
    await FS.setMeta('dockMag',true);
  }
};
function sizeOf(n){
  if(n.size && typeof n.size==='number' && n.size>0) return n.size;
  if(typeof n.content==='string') return n.content.length;
  return 0;
}

function iconHTML(node,size){
  size=size||54;
  const st='width:'+size+'px;height:'+size+'px;font-size:'+Math.round(size*0.46)+'px;';
  if(node.systemApp && SYSTEM_APPS[node.systemApp]){

    return '<div class="ico app" style="'+st+'background:linear-gradient(160deg,'+a.color+'cc,'+a.color+');border-radius:'+Math.round(size*0.23)+'px">'+a.glyph+'</div>';
  }
  if(node.type==='folder') return '<div class="ico folder" style="'+st+'">📁</div>';
  if(node.kind==='image' && typeof node.content==='string' && node.content.startsWith('data:image'))
    return '<div class="ico image" style="'+st+'background-image:url('+node.content+')"></div>';

  const cls = (node.kind in map)?node.kind:'generic';
  return '<div class="ico '+cls+'" style="'+st+'">'+(map[node.kind]||'📄')+'</div>';
}

/* ===================================================================== */
/* BOOT SYSTEM                                                             */
/* ===================================================================== */
async function boot(){
  const bar=$('#boot-bar');
  const logo=$('#boot-logo'); if(logo){ logo.onerror=()=>{ logo.style.display='none'; }; logo.src=BENOS.logo; }
  $('#boot').style.display='flex';
  $('#boot').style.opacity='1';
  try{
    await DB.open();
    await FS.load();
  }catch(e){
    return benFatal('File system failed to initialize: '+(e.message||e));
  }
  // Download BenOS system files (metadata) from the GitHub repository. The
  // boot progress bar reflects real download progress; falls back to a
  // simulated bar when the repo/network is unavailable so BenOS always boots.
  await downloadMetadata(bar);
  bar.style.width='100%';
  await new Promise(r=>setTimeout(r,400));
  $('#boot').style.opacity='0';
  // Only present the login screen when there is something to authenticate:
  // a password is set, or more than one user account exists. Otherwise
  // auto-login the single password-free user straight into the desktop.
  setTimeout(()=>{ $('#boot').style.display='none'; if(needsLogin())showLogin(); else autoLogin(); },800);
}

/* ===================================================================== */
/* METADATA DOWNLOAD SYSTEM                                                */
/* Downloads BenOS system files from the GitHub metadata repository.       */
/* Directory inside the repo is the BenOS version, e.g. /13.0/             */
/* Repo: https://github.com/dedeprogames-official/BenOS-Metadata           */
/* ===================================================================== */
const META_REPO = 'dedeprogames-official/BenOS-Metadata';
const META_VER = '13.0';
/* live metadata state: file listings per directory + loaded system sounds */
const META = { branch:'main', manifest:{backgrounds:[],sounds:[],musics:[]}, sounds:{}, musicReady:false, online:false };
function metaApi(dir){ return 'https://api.github.com/repos/'+META_REPO+'/contents/'+META_VER+'/'+dir+'?ref='+META.branch; }
function setBootStatus(txt){ /* boot is text-free (macOS-style) */ }
function assetKey(dir,name){ return 'asset:'+dir+':'+name; }
function blobToDataURL(blob){ return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=()=>rej(r.error);r.readAsDataURL(blob);}); }

/* list a metadata directory via the GitHub contents API */
async function metaList(dir){
  for(const branch of ['main','master']){
    META.branch=branch;
    const res=await fetchWithTimeout(metaApi(dir),12000);
    if(res && res.ok){
      const arr=await res.json();
      if(Array.isArray(arr)) return arr.filter(x=>x.type==='file'&&x.download_url).map(x=>({name:x.name,sha:x.sha,size:x.size||0,url:x.download_url,dir}));
    }
  }
  return [];
}
/* fetch the cached data URL for an asset key (null if not present) */
async function assetData(key){ try{ const r=await DB.get('assets',key); return r&&r.data?r.data:null; }catch(e){ return null; } }
/* download an asset if not already cached with the same sha (repair-on-boot) */
async function ensureAsset(f){
  const key=assetKey(f.dir,f.name);
  try{ const c=await DB.get('assets',key); if(c && c.data && (!f.url || c.sha===f.sha)) return c.data; }catch(e){}
  if(!f.url) return await assetData(key);   // cache-only entry, nothing to fetch
  try{
    const res=await fetchWithTimeout(f.url,60000);
    if(!res||!res.ok) throw new Error('download failed');
    const blob=await res.blob();
    const data=await blobToDataURL(blob);
    try{ await DB.put('assets',{key,dir:f.dir,name:f.name,sha:f.sha,size:f.size,data}); }catch(e){}
    return data;
  }catch(e){ return await assetData(key); }   // fall back to any cached copy
}

/* BOOT-TIME download: backgrounds + sounds (music is fetched later, in the background) */
async function downloadMetadata(bar){
  setBootStatus('Connecting to BenOS servers\u2026');
  let bg=[],snd=[],mus=[];
  try{ bg=await metaList('backgrounds'); }catch(e){}
  try{ snd=await metaList('sounds'); }catch(e){}
  try{ mus=await metaList('musics'); }catch(e){}
  META.manifest={backgrounds:bg,sounds:snd,musics:mus};
  META.online = (bg.length+snd.length+mus.length)>0;
  // If the GitHub API was unreachable/rate-limited but we have cached assets from
  // a previous boot, rebuild the manifest from the cache so wallpapers/music still appear.
  try{
    const cached=await DB.all('assets');
    if(cached.length){
      ['backgrounds','sounds','musics'].forEach(dir=>{
        if(!META.manifest[dir].length){
          META.manifest[dir]=cached.filter(a=>a.dir===dir).map(a=>({name:a.name,sha:a.sha,size:a.size||0,url:null,dir}));
        }
      });
    }
  }catch(e){}
  bg=META.manifest.backgrounds; snd=META.manifest.sounds; mus=META.manifest.musics;
  const bootFiles=bg.concat(snd);
  if(!bootFiles.length){ setBootStatus('BenOS 13.0 Beta 4'); await simulateBoot(bar); await loadSounds(); return; }
  const totalBytes=bootFiles.reduce((s,f)=>s+(f.size||1),0)||1;
  let doneBytes=0; bar.style.width='2%';
  setBootStatus('Downloading system files\u2026');
  for(const f of bootFiles){
    await ensureAsset(f);
    doneBytes+=(f.size||1);
    bar.style.width=Math.max(2,Math.round(doneBytes/totalBytes*100))+'%';
    setBootStatus('Downloading system files\u2026 '+fmtSize(doneBytes)+' / '+fmtSize(totalBytes));
  }
  try{ await FS.setMeta('systemMetadata',{version:BENOS.version,branch:META.branch,fetchedAt:now(),counts:{backgrounds:bg.length,sounds:snd.length,musics:mus.length}}); }catch(e){}
  await loadSounds();
  setBootStatus('BenOS 13.0 Beta 4');
}

/* load the alert/change/notification system sounds from cache into memory */
async function loadSounds(){
  for(const f of (META.manifest.sounds||[])){
    const base=f.name.replace(/\.\w+$/,'').toLowerCase();
    const d=await assetData(assetKey('sounds',f.name));
    if(d) META.sounds[base]=d;
  }
}

/* download the BenMusic library in the background, after the desktop is ready */
async function downloadMusicAssets(){
  const mus=META.manifest.musics||[]; if(!mus.length){ META.musicReady=true; return; }
  let got=0;
  for(const f of mus){ const d=await ensureAsset(f); if(d)got++; refreshMusicLibraries(); }
  META.musicReady=true; refreshMusicLibraries();
  if(got) notify('Music library ready', got+' track'+(got>1?'s':'')+' available in BenMusic','\ud83c\udfb5');
}
function refreshMusicLibraries(){ [...WM.windows.values()].forEach(w=>{ if(w.systemApp==='music'&&w.refreshLib){ try{w.refreshLib();}catch(e){} } }); }

/* ===================================================================== */
/* SYSTEM SOUNDS — alert / change / notification (metadata or synthesized) */
/* ===================================================================== */
let _soundCtx=null;
let _audioInited=false;
function initAudioCtx(){
  if(!_soundCtx){
    _soundCtx=new (window.AudioContext||window.webkitAudioContext)();
  }
  if(_soundCtx.state==='suspended') _soundCtx.resume();
  _audioInited=true;
}
// init audio on first user interaction (required by Chrome autoplay policy)
document.addEventListener('mousedown',()=>{ if(!_audioInited)initAudioCtx(); },{once:true});
document.addEventListener('keydown',()=>{ if(!_audioInited)initAudioCtx(); },{once:true});
function playSound(name){
  try{
    if(BENOS.muted) return;
    const data=META.sounds[name];
    if(data){ const a=new Audio(data); a.volume=Math.min(1,BENOS.volume); a.play().catch(()=>synthSound(name)); return; }
    synthSound(name);
  }catch(e){ try{ synthSound(name); }catch(_){} }
}
function synthSound(name){
  try{
    if(BENOS.muted) return;
    initAudioCtx();
    const ctx=_soundCtx; if(ctx.state==='suspended')ctx.resume();
    const o=ctx.createOscillator(), g=ctx.createGain();
    const map={alert:{f:233,t:'square',d:0.22},change:{f:620,t:'sine',d:0.06},notification:{f:740,t:'triangle',d:0.18}};
    const c=map[name]||map.change;
    o.type=c.t; o.frequency.value=c.f; o.connect(g); g.connect(ctx.destination);
    const t0=ctx.currentTime, vol=Math.min(0.35,BENOS.volume*0.35);
    g.gain.setValueAtTime(0.0001,t0); g.gain.exponentialRampToValueAtTime(vol,t0+0.012); g.gain.exponentialRampToValueAtTime(0.0001,t0+c.d);
    if(name==='notification'){ o.frequency.setValueAtTime(680,t0); o.frequency.exponentialRampToValueAtTime(1040,t0+c.d); }
    if(name==='alert'){ o.frequency.setValueAtTime(233,t0); o.frequency.setValueAtTime(196,t0+c.d/2); }
    o.start(t0); o.stop(t0+c.d+0.03);
  }catch(e){}
}

function fetchWithTimeout(url,ms){
  return new Promise((resolve)=>{
    let settled=false;
    const ctrl=(typeof AbortController!=='undefined')?new AbortController():null;
    const to=setTimeout(()=>{ if(!settled){ settled=true; if(ctrl)ctrl.abort(); resolve(null); } },ms||8000);
    const opts=ctrl?{signal:ctrl.signal,cache:'no-store'}:{cache:'no-store'};
    fetch(url,opts).then(r=>{ if(!settled){ settled=true; clearTimeout(to); resolve(r); } })
                   .catch(()=>{ if(!settled){ settled=true; clearTimeout(to); resolve(null); } });
  });
}

/* Original simulated boot bar \u2014 fallback when metadata is unavailable. */
function simulateBoot(bar){
  return new Promise(resolve=>{
    let p=0;
    const timer=setInterval(()=>{ p+=Math.random()*16+7; if(p>=100){ p=100; clearInterval(timer); } bar.style.width=p+'%'; },210);
    setTimeout(()=>{ clearInterval(timer); bar.style.width='100%'; resolve(); },1400);
  });
}

}
function autoLogin(){ BENOS.user=getUsers()[0].name; startDesktop(); }

let loginUserIdx=0;
function showLogin(){
  const users=getUsers();
  loginUserIdx=0;
  const lg=$('#login');
  lg.style.background="#0b1220 center/cover no-repeat";
  resolveWallpaper(FS.getMeta('wallpaper',null)).then(url=>{ lg.style.background="#0b1220 url('"+url+"') center/cover no-repeat"; }).catch(()=>{});
  lg.style.display='flex'; lg.style.opacity='1';
  const panel=$('#login .panel');
  const pwrow='<div class="pwrow"><input id="login-pass" type="password" placeholder="Enter Password" autocomplete="off"><div class="go" id="login-go">→</div></div><div class="hint" id="login-hint"></div>';
  if(users.length>1){
    panel.innerHTML='<div class="userpick">'+users.map((u,i)=>'<div class="upick'+(i===0?' sel':'')+'" data-i="'+i+'"><div class="uav">'+(u.avatar||'👤')+'</div><div class="un">'+esc(u.name)+'</div></div>').join('')+'</div>'+pwrow;
  }else{
    const u=users[0];
    panel.innerHTML='<div class="avatar" id="login-avatar">'+(u.avatar||'👤')+'</div><div class="uname" id="login-uname">'+esc(u.name)+'</div>'+pwrow;
  }
  wireLogin(users);
}
function wireLogin(users){
  const pass=$('#login-pass');
  const refresh=()=>{
    const cur=users[loginUserIdx];
    if($('#login-avatar'))$('#login-avatar').textContent=cur.avatar||'👤';
    if($('#login-uname'))$('#login-uname').textContent=cur.name;
    pass.placeholder=cur.pass?'Enter Password':'Press Enter to log in';
    if($('#login-hint'))$('#login-hint').textContent=cur.pass?'':'No password set — just press Enter';
    pass.value='';
    $$('.upick').forEach((e,i)=>e.classList.toggle('sel',i===loginUserIdx));
  };
  refresh(); setTimeout(()=>pass.focus(),120);
  $$('.upick').forEach(e=>e.onclick=()=>{ loginUserIdx=+e.dataset.i; refresh(); pass.focus(); });
  const attempt=()=>{
    const cur=users[loginUserIdx];
    if(pass.value===(cur.pass||'')){ BENOS.user=cur.name; doLoginSuccess(); }
    else{ const pnl=$('#login .panel'); pnl.classList.add('shake'); setTimeout(()=>pnl.classList.remove('shake'),450); pass.value=''; }
  };
  $('#login-go').onclick=attempt;
  pass.onkeydown=e=>{ if(e.key==='Enter')attempt(); };
}
function doLoginSuccess(){
  const lg=$('#login');
  lg.style.opacity='0';
  setTimeout(()=>{ lg.style.display='none'; startDesktop(); },700);
}

/* Windows-style caption button glyphs (use currentColor so hover recolours) */
const WIN_ICONS = {
  min:    '<svg width="11" height="11" viewBox="0 0 11 11"><rect x="1" y="5.2" width="9" height="1.1" fill="currentColor"/></svg>',
  max:    '<svg width="11" height="11" viewBox="0 0 11 11"><rect x="1.5" y="1.5" width="8" height="8" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>',
  restore:'<svg width="11" height="11" viewBox="0 0 11 11"><rect x="1.2" y="3" width="6" height="6" fill="none" stroke="currentColor" stroke-width="1.1"/><path d="M3.6 3V1.3h6.2v6.2H8" fill="none" stroke="currentColor" stroke-width="1.1"/></svg>',
  close:  '<svg width="11" height="11" viewBox="0 0 11 11"><path d="M1.5 1.5l8 8M9.5 1.5l-8 8" stroke="currentColor" stroke-width="1.2"/></svg>',
};
const WM = {
  windows:new Map(),
  zTop:100,
  focused:null,
  cascade:0,

  create(opt){
    const id=uid();
    const layer=$('#window-layer');
    const w=el('div','window');
    const ww=opt.width||640, wh=opt.height||440;
    const vw=window.innerWidth, vh=window.innerHeight-24;
    let x = opt.x!=null?opt.x : Math.max(20,(vw-ww)/2)+ (WM.cascade*26)%160 -80;
    let y = opt.y!=null?opt.y : Math.max(14,(vh-wh)/2-30)+ (WM.cascade*26)%140 -70;
    WM.cascade++;
    w.style.left=Math.max(4,x)+'px'; w.style.top=Math.max(4,y)+'px';
    w.style.width=ww+'px'; w.style.height=wh+'px';
    w.innerHTML =
      '<div class="titlebar">'+
        '<div class="title">'+esc(opt.title||'Window')+'</div>'+
        '<div class="wctrls">'+
          '<div class="wbtn min" title="Minimize">'+WIN_ICONS.min+'</div>'+
          '<div class="wbtn max" title="Maximize">'+WIN_ICONS.max+'</div>'+
          '<div class="wbtn close" title="Close">'+WIN_ICONS.close+'</div>'+
        '</div>'+
      '</div>'+
      '<div class="win-body"></div>'+
      '<div class="resz n"></div><div class="resz s"></div><div class="resz e"></div><div class="resz w"></div>'+
      '<div class="resz ne"></div><div class="resz nw"></div><div class="resz se"></div><div class="resz sw"></div>';
    layer.appendChild(w);

    const win={
      id, el:w, appName:opt.title||'Window', fileId:opt.fileId||null, systemApp:opt.systemApp||null,
      body:$('.win-body',w), titleEl:$('.title',w),
      minimized:false, maximized:false, prevRect:null, alwaysTop:false,
      onClose:opt.onClose||null,
      guard(fn){ return function(){ try{ return fn.apply(this,arguments); }catch(e){ appCrash(win,e.message||e); } }; },
      setTitle(t){ win.appName=t; win.titleEl.textContent=t; if(WM.focused===win)refreshMenuApp(); },
    };
    WM.windows.set(id,win);

    // Windows-style caption buttons
    $('.wbtn.close',w).onclick=(e)=>{e.stopPropagation();WM.close(win);};
    $('.wbtn.min',w).onclick=(e)=>{e.stopPropagation();WM.minimize(win);};
    $('.wbtn.max',w).onclick=(e)=>{e.stopPropagation();WM.toggleMax(win);};
    $('.titlebar',w).ondblclick=(e)=>{ if(e.target.closest('.wbtn'))return; WM.toggleMax(win); };

    // focus on mousedown
    w.addEventListener('mousedown',()=>WM.focus(win),true);
    // dragging
    WM._dragify(win);
    WM._resizify(win);
    // window context menu
    $('.titlebar',w).addEventListener('contextmenu',e=>{ e.preventDefault();e.stopPropagation(); windowMenu(win,e.clientX,e.clientY); });

    WM.focus(win);
    setTimeout(()=>w.classList.add('show'),15);
    return win;
  },

  focus(win){
    if(WM.focused===win){return;}
    if(WM.focused){ WM.focused.el.classList.add('blur'); }
    WM.focused=win;
    win.el.classList.remove('blur');
    win.el.style.zIndex = win.alwaysTop? 5000 : (++WM.zTop);
    refreshMenuApp();
    updateDockRunning();
  },

  _dragify(win){
    const tb=$('.titlebar',win.el);
    tb.addEventListener('mousedown',e=>{
      if(e.target.closest('.wbtn'))return;
      if(win.maximized)return;
      e.preventDefault();
      const sx=e.clientX, sy=e.clientY;
      const ox=parseFloat(win.el.style.left), oy=parseFloat(win.el.style.top);
      const mv=ev=>{
        let nx=ox+ev.clientX-sx, ny=oy+ev.clientY-sy;
        ny=Math.max(0,ny);
        win.el.style.left=nx+'px'; win.el.style.top=ny+'px';
      };
      const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
      document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
    });
  },

  _resizify(win){
    $$('.resz',win.el).forEach(h=>{
      h.addEventListener('mousedown',e=>{
        e.preventDefault();e.stopPropagation();
        if(win.maximized)return;
        const dir=h.className.replace('resz','').trim();
        const sx=e.clientX,sy=e.clientY;
        const r=win.el.getBoundingClientRect();
        const minW=260,minH=160;
        const mv=ev=>{
          let dx=ev.clientX-sx, dy=ev.clientY-sy;
          let nl=r.left,nt=r.top-24,nw=r.width,nh=r.height; // -24 for menubar offset of layer
          nt=r.top; // layer is offset; use absolute then convert
          let left=parseFloat(win.el.style.left), top=parseFloat(win.el.style.top);
          let W=r.width,H=r.height;
          if(dir.includes('e'))W=Math.max(minW,r.width+dx);
          if(dir.includes('s'))H=Math.max(minH,r.height+dy);
          if(dir.includes('w')){ const nW=Math.max(minW,r.width-dx); left=left+(r.width-nW); W=nW; }
          if(dir.includes('n')){ const nH=Math.max(minH,r.height-dy); top=Math.max(0,top+(r.height-nH)); H=nH; }
          win.el.style.width=W+'px'; win.el.style.height=H+'px';
          win.el.style.left=left+'px'; win.el.style.top=top+'px';
        };
        const up=()=>{document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);};
        document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
      });
    });
  },

  minimize(win){
    win.minimized=true; win.el.classList.add('min');
    setTimeout(()=>{ if(win.minimized)win.el.style.display='none'; },180);
    if(WM.focused===win){ WM.focused=null; WM._focusNext(); }
    updateDockRunning();
  },
  restore(win){
    win.minimized=false; win.el.style.display='flex';
    setTimeout(()=>win.el.classList.remove('min'),15);
    WM.focus(win);
  },
  toggleMax(win){
    const maxBtn=$('.wbtn.max',win.el);
    win.el.classList.add('win-anim');
    setTimeout(()=>win.el.classList.remove('win-anim'),300);
    if(win.maximized){
      win.maximized=false; win.el.classList.remove('maxd');
      const p=win.prevRect; if(p){win.el.style.left=p.l;win.el.style.top=p.t;win.el.style.width=p.w;win.el.style.height=p.h;}
      if(maxBtn){ maxBtn.innerHTML=WIN_ICONS.max; maxBtn.title='Maximize'; }
      $('#dock-wrap').classList.remove('dock-hide');
      $('#menubar').classList.remove('mbar-hide');
    }else{
      win.prevRect={l:win.el.style.left,t:win.el.style.top,w:win.el.style.width,h:win.el.style.height};
      win.maximized=true; win.el.classList.add('maxd');
      win.el.style.left='0px'; win.el.style.top='0px';
      win.el.style.width=window.innerWidth+'px';
      win.el.style.height=window.innerHeight+'px';
      if(maxBtn){ maxBtn.innerHTML=WIN_ICONS.restore; maxBtn.title='Restore'; }
      $('#dock-wrap').classList.add('dock-hide');
      $('#menubar').classList.add('mbar-hide');
    }
  },
  close(win,silent){
    if(!WM.windows.has(win.id))return;
    if(win.onClose && !silent){ try{win.onClose();}catch(e){} }
    win.el.classList.remove('show');
    setTimeout(()=>{ win.el.remove(); },280);
    WM.windows.delete(win.id);
    if(WM.focused===win){ WM.focused=null; WM._focusNext(); }
    refreshMenuApp(); updateDockRunning();
  },
  _focusNext(){
    let top=null,z=-1;
    WM.windows.forEach(w=>{ if(!w.minimized){ const wz=parseInt(w.el.style.zIndex||0); if(wz>z){z=wz;top=w;} } });
    if(top)WM.focus(top); else { WM.focused=null; refreshMenuApp(); }
  },
  byApp(systemApp){ return [...WM.windows.values()].filter(w=>w.systemApp===systemApp); },
};

/* Resolve a stored wallpaper value to a usable CSS url.
   - "asset:backgrounds:<name>"  -> cached metadata image (data URL)
   - a legacy default URL          -> treated as "use current default"
   - any other string              -> custom URL / data URL
   - null/default                  -> metadata "sierra" background, else local fallback */
async function resolveWallpaper(wp){
  if(wp && typeof wp==='string'){
    if(wp.indexOf('asset:')===0){ const d=await assetData(wp); return d || (await defaultWallpaperURL()); }
    if(!BENOS.oldWallpapers.includes(wp)) return wp;       // a genuine custom wallpaper
  }
  return await defaultWallpaperURL();
}
async function defaultWallpaperURL(){
  const sierra=await assetData(assetKey('backgrounds','sierra.png'));
  return sierra || BENOS.defaultWallpaper || BENOS.fallbackWallpaper;
}
async function applyWallpaper(){
  const desk=$('#desktop');
  const url=await resolveWallpaper(FS.getMeta('wallpaper',null));
  // preload so a failed remote URL falls back to the local gradient
  const img=new Image();
  img.onload=()=>{ desk.style.backgroundImage="url('"+url+"')"; };
  img.onerror=()=>{ desk.style.backgroundImage="url('"+BENOS.fallbackWallpaper+"')"; };
  desk.style.backgroundImage="url('"+url+"'),url('"+BENOS.fallbackWallpaper+"')";
  img.src=url;
}

/* DESKTOP ICONS — render, position persist, drag, select                 */
/* ===================================================================== */
let deskSel=new Set();
function renderDesktopIcons(){
  const layer=$('#icon-layer'); layer.innerHTML='';
  const items=FS.children('desktop');
  let gx=window.innerWidth-110, gy=14, col=0;
  items.forEach(n=>{
    if(n.dx==null||n.dy==null){ n.dx=gx; n.dy=gy; gy+=104; if(gy>window.innerHeight-180){gy=14;gx-=100;} FS.save(n); }
    layer.appendChild(makeDesktopIcon(n));
  });
}
function makeDesktopIcon(n){
  const d=el('div','desk-icon');
  d.style.left=n.dx+'px'; d.style.top=n.dy+'px';
  d.dataset.id=n.id;
  d.innerHTML='<div class="ic">'+iconHTML(n,54)+'</div><div class="nm">'+esc(n.name)+'</div>';
  d.addEventListener('mousedown',e=>{ if(e.button!==0)return; deskIconDrag(e,d,n); });
  d.addEventListener('dblclick',()=>openNode(n));
  d.addEventListener('click',e=>{e.stopPropagation();selectDesktop(n.id,e.shiftKey||e.metaKey||e.ctrlKey);});
  d.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();selectDesktop(n.id,false);nodeContextMenu(n,e.clientX,e.clientY,'desktop');});
  return d;
}
function selectDesktop(id,add){
  if(!add){ deskSel.clear(); $$('.desk-icon').forEach(x=>x.classList.remove('sel')); }
  deskSel.add(id);
  const elx=$('.desk-icon[data-id="'+id+'"]'); if(elx)elx.classList.add('sel');
}
function deskIconDrag(e,d,n){
  selectDesktop(n.id,e.shiftKey);
  const sx=e.clientX,sy=e.clientY; const ox=n.dx,oy=n.dy; let moved=false; let lx=e.clientX,ly=e.clientY;
  const mv=ev=>{
    lx=ev.clientX; ly=ev.clientY;
    const dx=ev.clientX-sx,dy=ev.clientY-sy;
    if(Math.abs(dx)+Math.abs(dy)>3)moved=true;
    if(moved)d.style.pointerEvents='none';   // so elementFromPoint sees the dock beneath
    d.style.left=Math.max(0,ox+dx)+'px'; d.style.top=Math.max(0,oy+dy)+'px';
  };
  const up=()=>{
    document.removeEventListener('mousemove',mv);document.removeEventListener('mouseup',up);
    d.style.pointerEvents='';
    if(moved){
      const over=document.elementFromPoint(lx,ly);
      const dockItem=over&&over.closest?over.closest('.dock-item'):null;
      if(dockItem && dockItem.dataset.id==='trash'){ deleteNode(n); return; }      // drop on Trash
      if(dockItem && over.closest('#dock') && (n.systemApp||n.type==='app'||/\.html?$/i.test(n.name))){ dockAdd(n.id); renderDesktopIcons(); return; } // drop app on Dock
      n.dx=parseFloat(d.style.left); n.dy=parseFloat(d.style.top); FS.save(n);
    }
  };
  document.addEventListener('mousemove',mv);document.addEventListener('mouseup',up);
}
function sortDesktopIcons(){
  const items=FS.children('desktop').sort((a,b)=>a.type===b.type?a.name.localeCompare(b.name):(a.type==='folder'?-1:1));
  let gx=window.innerWidth-110, gy=14;
  items.forEach(n=>{ n.dx=gx;n.dy=gy; gy+=104; if(gy>window.innerHeight-180){gy=14;gx-=100;} FS.save(n); });
  renderDesktopIcons();
}

/* ===================================================================== */
/* DOCK                                                                    */
/* ===================================================================== */
function buildDock(){
  const dock=$('#dock'); dock.innerHTML='';
  const ids=FS.getMeta('dock',[]);
  const size=FS.getMeta('dockSize',52);
  ids.forEach(id=>{
    const n=FS.get(id); if(!n)return;
    dock.appendChild(makeDockItem(n,size));
  });
  // right side: Downloads + Trash (separated from the apps)
  dock.appendChild(el('div','dock-sep'));
  const dl=FS.get('downloads');
  if(dl) dock.appendChild(makeDockItem(dl,size));
  const tr=FS.get('trash');
  if(tr) dock.appendChild(makeTrashItem(size));
  // accept HTML5 drags from the Files app: drop an app here to pin it to the Dock
  dock.ondragover=e=>{ if((e.dataTransfer.types||[]).indexOf('benos/id')>=0){ e.preventDefault(); } };
  dock.ondrop=e=>{
    const id=e.dataTransfer.getData('benos/id'); if(!id)return;
    if(e.target.closest('.dock-item[data-id="trash"]'))return;   // Trash has its own handler
    e.preventDefault(); const n=FS.get(id); if(!n)return;
    if(n.systemApp||n.type==='app'||/\.html?$/i.test(n.name)) dockAdd(id);
    else { notify('Only apps can be pinned','Drag “'+n.name+'” to the Trash to delete it instead','⚠️'); playSound('alert'); }
  };
  setupDockMagnify();
  updateDockRunning();
}
function makeTrashItem(size){
  const it=el('div','dock-item'); it.dataset.id='trash';
  const full=FS.children('trash').length>0;
  it.style.width=size+'px'; it.style.height=size+'px';
  const fs=Math.round(size*0.5);
  it.innerHTML='<div class="ico" style="width:'+size+'px;height:'+size+'px;font-size:'+fs+'px;background:linear-gradient(160deg,#dfe2e8,#b9bfc9);color:#54585f;border-radius:13px">'+(full?'🗑':'🗑')+'</div><div class="run"></div><div class="tip">Trash'+(full?' ('+FS.children('trash').length+')':' (Empty)')+'</div>';
  it.addEventListener('click',()=>{ bounceDock(it); launchSystemApp('files','trash'); });
  it.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();
    showCtx(e.clientX,e.clientY,[
      {label:'Open',action:()=>launchSystemApp('files','trash')},
      {label:'Empty Trash',action:emptyTrash,disabled:!full},
    ]);
  });
  // drop a file/folder here (from the Files app) to move it to the Trash
  it.addEventListener('dragover',e=>{ if((e.dataTransfer.types||[]).indexOf('benos/id')>=0){ e.preventDefault(); it.classList.add('drop-hot'); } });
  it.addEventListener('dragleave',()=>it.classList.remove('drop-hot'));
  it.addEventListener('drop',e=>{ e.preventDefault(); e.stopPropagation(); it.classList.remove('drop-hot'); const id=e.dataTransfer.getData('benos/id'); if(id){ const n=FS.get(id); if(n)deleteNode(n); } });
  return it;
}
function makeDockItem(n,size){
  const it=el('div','dock-item');
  it.dataset.id=n.id;
  it.style.width=size+'px'; it.style.height=size+'px';
  it.innerHTML=iconHTML(n,size)+'<div class="run"></div><div class="tip">'+esc(n.name.replace(/\.html$/,''))+'</div>';
  $('.ico',it).style.width=size+'px'; $('.ico',it).style.height=size+'px';
  it.addEventListener('click',()=>{ bounceDock(it); openNode(n); });
  it.addEventListener('contextmenu',e=>{e.preventDefault();e.stopPropagation();dockContextMenu(n,e.clientX,e.clientY);});
  return it;
}
function bounceDock(it){
  it.animate([{transform:'translateY(0)'},{transform:'translateY(-22px)'},{transform:'translateY(0)'}],{duration:520,easing:'ease-out'});
}
function setupDockMagnify(){
  const dock=$('#dock');
  const mag=FS.getMeta('dockMag',true);
  const items=()=>$$('.dock-item',dock);
  // macOS-style magnification: smooth Gaussian falloff, tracked in real time
  // (no CSS width/height transition while moving, or it would lag the cursor)
  dock.onmouseenter=()=>{ items().forEach(it=>it.classList.remove('dock-ease')); };
  dock.onmousemove=mag?(e)=>{
    const base=FS.getMeta('dockSize',52);
    const peak=base*0.9;     // extra px at the cursor (≈1.9× at the centre)
    const sigma=Math.max(48,base*1.15);  // spread of the magnification
    items().forEach(it=>{
      it.classList.remove('dock-ease');
      const r=it.getBoundingClientRect(); const c=r.left+r.width/2;
      const d=e.clientX-c;
      const s=base + peak*Math.exp(-(d*d)/(2*sigma*sigma));
      it.style.width=s+'px'; it.style.height=s+'px';
      const ic=$('.ico',it); if(ic){ ic.style.width=s+'px'; ic.style.height=s+'px'; ic.style.fontSize=Math.round(s*0.46)+'px'; }
    });
  }:null;
  dock.onmouseleave=()=>{ const base=FS.getMeta('dockSize',52); items().forEach(it=>{ it.classList.add('dock-ease'); it.style.width=base+'px';it.style.height=base+'px'; const ic=$('.ico',it);if(ic){ic.style.width=base+'px';ic.style.height=base+'px';ic.style.fontSize=Math.round(base*0.46)+'px';} }); };
}
function updateDockRunning(){
  const running=new Set([...WM.windows.values()].map(w=>w.fileId).filter(Boolean));
  $$('.dock-item').forEach(it=>{ it.classList.toggle('running', running.has(it.dataset.id)); });
}
async function dockAdd(id){
  const ids=FS.getMeta('dock',[]); if(ids.includes(id)){return;}
  ids.push(id); await FS.setMeta('dock',ids); buildDock(); notify('Added to Dock',(FS.get(id)||{}).name||'','📌');
}
async function dockRemove(id){
  let ids=FS.getMeta('dock',[]); ids=ids.filter(x=>x!==id); await FS.setMeta('dock',ids); buildDock();
}
